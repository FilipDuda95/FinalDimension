<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>VOID RUNNER — ULTRA HARDCORE</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');

  :root {
    --neon-cyan: #00ffff;
    --neon-red: #ff003c;
    --neon-green: #39ff14;
    --neon-yellow: #ffee00;
    --neon-purple: #bf00ff;
    --neon-orange: #ff6600;
    --bg: #000005;
    --scan-opacity: 0.04;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    overflow: hidden;
    font-family: 'Share Tech Mono', monospace;
    cursor: crosshair;
  }

  #gameCanvas {
    display: block;
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    image-rendering: pixelated;
  }

  /* CRT Scanlines */
  #crt {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 10;
    background: repeating-linear-gradient(
      to bottom,
      transparent,
      transparent 2px,
      rgba(0,0,0,var(--scan-opacity)) 2px,
      rgba(0,0,0,var(--scan-opacity)) 4px
    );
  }

  /* Top black fade */
  #topFade {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 18%;
    pointer-events: none;
    z-index: 11;
    background: linear-gradient(to bottom, #000000 0%, rgba(0,0,0,0.7) 50%, transparent 100%);
  }

  /* Vignette */
  #vignette {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 9;
    background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.75) 100%);
  }

  /* HUD */
  #hud {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 20;
    font-family: 'Orbitron', monospace;
  }

  #scorePanel {
    position: absolute;
    top: 20px; left: 24px;
    color: var(--neon-cyan);
    text-shadow: 0 0 8px var(--neon-cyan), 0 0 20px rgba(0,255,255,0.4);
    font-size: clamp(10px, 1.8vw, 18px);
    line-height: 1.8;
    letter-spacing: 0.12em;
  }

  #scorePanel .val {
    color: #fff;
    font-size: 1.3em;
    font-weight: 900;
    text-shadow: 0 0 12px #fff;
  }

  #livesPanel {
    position: absolute;
    top: 20px; right: 24px;
    text-align: right;
    color: var(--neon-red);
    text-shadow: 0 0 8px var(--neon-red);
    font-size: clamp(10px, 1.8vw, 18px);
    line-height: 1.8;
    letter-spacing: 0.1em;
  }

  #healthBar, #shieldBar {
    width: clamp(120px, 18vw, 220px);
    height: 8px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 2px;
    margin: 3px 0 3px auto;
    overflow: hidden;
  }

  #healthFill {
    height: 100%;
    background: linear-gradient(to right, var(--neon-red), #ff6666);
    box-shadow: 0 0 6px var(--neon-red);
    transition: width 0.15s;
  }

  #shieldFill {
    height: 100%;
    background: linear-gradient(to right, #0066ff, var(--neon-cyan));
    box-shadow: 0 0 6px var(--neon-cyan);
    transition: width 0.15s;
  }

  #powerupBar {
    position: absolute;
    bottom: 24px; left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 12px;
  }

  .pu-slot {
    width: clamp(36px, 5vw, 52px);
    height: clamp(36px, 5vw, 52px);
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 4px;
    background: rgba(0,0,0,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(14px, 2vw, 20px);
    color: rgba(255,255,255,0.4);
    position: relative;
    overflow: hidden;
  }

  .pu-slot.active {
    border-color: var(--neon-green);
    box-shadow: 0 0 12px var(--neon-green), inset 0 0 8px rgba(57,255,20,0.15);
    color: var(--neon-green);
  }

  .pu-slot.active .pu-timer {
    position: absolute;
    bottom: 0; left: 0;
    height: 3px;
    background: var(--neon-green);
    box-shadow: 0 0 4px var(--neon-green);
  }

  #waveAlert {
    position: absolute;
    top: 35%; left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Orbitron', monospace;
    font-size: clamp(18px, 4vw, 42px);
    font-weight: 900;
    letter-spacing: 0.25em;
    color: #fff;
    text-shadow: 0 0 20px var(--neon-red), 0 0 40px var(--neon-red);
    opacity: 0;
    transition: opacity 0.3s;
    white-space: nowrap;
    text-align: center;
  }

  #combo {
    position: absolute;
    top: 40%; right: 28px;
    font-family: 'Orbitron', monospace;
    font-size: clamp(12px, 2.5vw, 28px);
    font-weight: 900;
    color: var(--neon-yellow);
    text-shadow: 0 0 16px var(--neon-yellow);
    opacity: 0;
    text-align: right;
  }

  #crosshair {
    position: fixed;
    width: 28px; height: 28px;
    pointer-events: none;
    z-index: 30;
    transform: translate(-50%, -50%);
  }

  /* SCREENS */
  .screen {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 50;
    background: radial-gradient(ellipse at center, rgba(0,0,20,0.92) 0%, rgba(0,0,0,0.98) 100%);
  }

  .screen h1 {
    font-family: 'Orbitron', monospace;
    font-size: clamp(28px, 6vw, 72px);
    font-weight: 900;
    letter-spacing: 0.3em;
    color: #fff;
    text-shadow: 0 0 20px var(--neon-cyan), 0 0 50px rgba(0,255,255,0.3);
    margin-bottom: 8px;
    text-align: center;
  }

  .screen .sub {
    font-family: 'Orbitron', monospace;
    font-size: clamp(10px, 1.6vw, 16px);
    letter-spacing: 0.5em;
    color: var(--neon-red);
    text-shadow: 0 0 10px var(--neon-red);
    margin-bottom: 40px;
    text-align: center;
  }

  .btn {
    font-family: 'Orbitron', monospace;
    font-size: clamp(12px, 2vw, 18px);
    font-weight: 700;
    letter-spacing: 0.25em;
    padding: 14px 40px;
    background: transparent;
    border: 2px solid var(--neon-cyan);
    color: var(--neon-cyan);
    text-shadow: 0 0 8px var(--neon-cyan);
    box-shadow: 0 0 16px rgba(0,255,255,0.3), inset 0 0 16px rgba(0,255,255,0.05);
    cursor: pointer;
    transition: all 0.15s;
    pointer-events: all;
    margin: 8px;
    text-transform: uppercase;
  }

  .btn:hover {
    background: rgba(0,255,255,0.1);
    box-shadow: 0 0 30px rgba(0,255,255,0.5), inset 0 0 20px rgba(0,255,255,0.1);
    transform: scale(1.04);
  }

  .instructions {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(10px, 1.4vw, 13px);
    color: rgba(255,255,255,0.55);
    line-height: 2;
    text-align: center;
    letter-spacing: 0.08em;
    margin-top: 24px;
  }

  .instructions span { color: var(--neon-yellow); }

  .scanline-anim {
    animation: scanPulse 4s linear infinite;
  }

  @keyframes scanPulse {
    0% { --scan-opacity: 0.04; }
    50% { --scan-opacity: 0.07; }
    100% { --scan-opacity: 0.04; }
  }

  #fpsCounter {
    position: absolute;
    bottom: 8px; right: 14px;
    font-size: 11px;
    color: rgba(255,255,255,0.25);
    font-family: 'Share Tech Mono', monospace;
    letter-spacing: 0.1em;
  }

  #gameOverScore {
    font-family: 'Orbitron', monospace;
    font-size: clamp(14px, 2.5vw, 24px);
    color: var(--neon-yellow);
    text-shadow: 0 0 12px var(--neon-yellow);
    margin: 16px 0;
    letter-spacing: 0.2em;
  }
</style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<!-- Overlays -->
<div id="crt" class="scanline-anim"></div>
<div id="topFade"></div>
<div id="vignette"></div>

<!-- Custom Crosshair -->
<svg id="crosshair" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
  <circle cx="14" cy="14" r="5" stroke="#00ffff" stroke-width="1.5" opacity="0.9"/>
  <line x1="14" y1="0" x2="14" y2="8" stroke="#00ffff" stroke-width="1.5" opacity="0.7"/>
  <line x1="14" y1="20" x2="14" y2="28" stroke="#00ffff" stroke-width="1.5" opacity="0.7"/>
  <line x1="0" y1="14" x2="8" y2="14" stroke="#00ffff" stroke-width="1.5" opacity="0.7"/>
  <line x1="20" y1="14" x2="28" y2="14" stroke="#00ffff" stroke-width="1.5" opacity="0.7"/>
</svg>

<!-- HUD -->
<div id="hud">
  <div id="scorePanel">
    SCORE<br><span class="val" id="scoreVal">0</span><br>
    WAVE<br><span class="val" id="waveVal">1</span><br>
    KILLS<br><span class="val" id="killVal">0</span>
  </div>
  <div id="livesPanel">
    LIVES &nbsp;<span class="val" id="livesVal">3</span><br>
    HEALTH
    <div id="healthBar"><div id="healthFill" style="width:100%"></div></div>
    SHIELD
    <div id="shieldBar"><div id="shieldFill" style="width:0%"></div></div>
  </div>
  <div id="powerupBar">
    <div class="pu-slot" id="pu0">🛡</div>
    <div class="pu-slot" id="pu1">⚡</div>
    <div class="pu-slot" id="pu2">⏱</div>
  </div>
  <div id="waveAlert"></div>
  <div id="combo"></div>
  <div id="fpsCounter">60 FPS</div>
</div>

<!-- TITLE SCREEN -->
<div class="screen" id="titleScreen">
  <h1>VOID RUNNER</h1>
  <div class="sub">ULTRA HARDCORE EDITION</div>
  <button class="btn" onclick="startGame()">LAUNCH SEQUENCE</button>
  <div class="instructions">
    <span>MOUSE</span> — AIM &amp; PAN CAMERA &nbsp;|&nbsp; <span>CLICK / SPACE</span> — FIRE LASER<br>
    <span>MOBILE</span> — TILT / DRAG TO STEER &nbsp;|&nbsp; <span>TAP</span> — FIRE<br>
    Destroy asteroids · Collect power-ups · Survive the void
  </div>
</div>

<!-- GAME OVER SCREEN -->
<div class="screen" id="gameOverScreen" style="display:none">
  <h1>VOID BREACH</h1>
  <div class="sub">SYSTEM FAILURE</div>
  <div id="gameOverScore"></div>
  <button class="btn" onclick="startGame()">RESTART</button>
</div>

<script>
"use strict";
// ════════════════════════════════════════════════════════
//  VOID RUNNER — ULTRA HARDCORE ENGINE
//  NVIDIA Research (rendering) + OpenAI (logic) + Epic (feel)
// ════════════════════════════════════════════════════════

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// ── CONFIG ───────────────────────────────────────────────
const CFG = {
  FOV: 900,          // focal length
  VIEWER_D: 200,     // viewer distance offset
  STAR_COUNT: 340,
  ASTEROID_INIT: 5,
  MAX_PARTICLES: 600,
  MAX_LASERS: 40,
  FIRE_COOLDOWN_BASE: 180,   // ms
  SHIP_SPEED: 4.2,
  SCROLL_SPEED: 2.8,
  WAVE_INTERVAL: 18000,      // ms
  POWER_UP_INTERVAL: 9000,
  SHAKE_DECAY: 0.88,
};

// ── STATE ────────────────────────────────────────────────
let W, H, cx, cy;
let gameState = 'title'; // title | playing | dead
let score = 0, lives = 3, kills = 0, wave = 1;
let health = 100, shield = 0;
let combo = 0, comboTimer = 0;
let frameCount = 0, lastFpsTime = 0, fps = 60;
let lastTime = 0, dt = 0;
let waveTimer = 0, powerUpTimer = 0;
let shakeX = 0, shakeY = 0, shakeMag = 0;
let cameraX = 0, cameraY = 0; // smooth pan
let targetCamX = 0, targetCamY = 0;
let timeSlow = false, timeSlowTimer = 0;
let fireRateBoost = false, fireRateTimer = 0;
let shieldActive = false, shieldTimer = 0;
let lastFireTime = 0;
let waveAlertTimer = 0;
let comboDisplayTimer = 0;
let totalGameTime = 0;
let invincibleTimer = 0;

// ── INPUT ────────────────────────────────────────────────
const input = {
  mouse: { x: 0, y: 0, down: false },
  touch: { active: false, x: 0, y: 0, startX: 0, startY: 0 },
  gyro: { beta: 0, gamma: 0 },
  firing: false,
  isMobile: /Mobi|Android/i.test(navigator.userAgent),
};

// ── SHIP ────────────────────────────────────────────────
const ship = {
  x: 0, y: 0, z: 0,
  vx: 0, vy: 0,
  roll: 0, pitch: 0,
  engineFlicker: 0,
  dead: false,
  blinkTimer: 0,
};

// ── POOLS ─────────────────────────────────────────────── 
let stars = [];
let asteroids = [];
let lasers = [];
let particles = [];
let powerUps = [];
let anomalies = [];
let floatTexts = [];

// ── PROJECTION ───────────────────────────────────────────
function project(x, y, z) {
  const dz = z + CFG.VIEWER_D;
  if (dz <= 0.01) return null;
  const f = CFG.FOV;
  const sx = (x * f / dz) + cx + cameraX;
  const sy = (y * f / dz) + cy + cameraY;
  const scale = f / dz;
  return { sx, sy, scale, dz };
}

// ── RESIZE ───────────────────────────────────────────────
function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  cx = W / 2;
  cy = H / 2;
}
window.addEventListener('resize', resize);
resize();

// ── STARS ────────────────────────────────────────────────
function initStars() {
  stars = [];
  for (let i = 0; i < CFG.STAR_COUNT; i++) {
    stars.push({
      x: (Math.random() - 0.5) * 2200,
      y: (Math.random() - 0.5) * 1400,
      z: Math.random() * 1800 + 50,
      r: Math.random(),
      spd: Math.random() * 1.5 + 0.4,
      hue: Math.random() < 0.08 ? 180 + Math.random() * 60 : 0,
    });
  }
}

// ── ASTEROID ─────────────────────────────────────────────
let astId = 0;
function spawnAsteroid(x, y, z, radius, vx, vy, vz, tier) {
  return {
    id: astId++,
    x: x ?? (Math.random() - 0.5) * 2000,
    y: y ?? (Math.random() - 0.5) * 900,
    z: z ?? (Math.random() * 1200 + 600),
    vx: vx ?? (Math.random() - 0.5) * 1.2,
    vy: vy ?? (Math.random() - 0.5) * 0.9,
    vz: vz ?? -(Math.random() * 4 + CFG.SCROLL_SPEED * (1 + wave * 0.18)),
    radius: radius ?? (Math.random() * 36 + 20),
    tier: tier ?? Math.floor(Math.random() * 3),
    rot: Math.random() * Math.PI * 2,
    rotSpd: (Math.random() - 0.5) * 0.06,
    hp: tier === 0 ? 3 : tier === 1 ? 2 : 1,
    verts: generateAsteroidVerts(Math.floor(Math.random() * 4) + 6),
    color: tier === 0 ? '#ff4422' : tier === 1 ? '#ff8844' : '#ffaa66',
  };
}

function generateAsteroidVerts(n) {
  const v = [];
  for (let i = 0; i < n; i++) {
    const a = (i / n) * Math.PI * 2;
    const r = 0.65 + Math.random() * 0.45;
    v.push([Math.cos(a) * r, Math.sin(a) * r]);
  }
  return v;
}

// ── PARTICLE ─────────────────────────────────────────────
function spawnParticles(x, y, z, count, colorArr, speedMul) {
  for (let i = 0; i < count; i++) {
    if (particles.length >= CFG.MAX_PARTICLES) particles.shift();
    const a = Math.random() * Math.PI * 2;
    const spd = (Math.random() * 3 + 1) * (speedMul || 1);
    particles.push({
      x, y, z,
      vx: Math.cos(a) * spd * (Math.random() * 2.5 - 0.5) + (Math.random()-0.5)*3,
      vy: Math.sin(a) * spd * (Math.random() * 2.5 - 0.5) + (Math.random()-0.5)*3,
      vz: (Math.random() - 0.5) * spd * 4,
      life: 1.0,
      decay: Math.random() * 0.028 + 0.012,
      r: Math.random() * 3.5 + 1,
      color: colorArr[Math.floor(Math.random() * colorArr.length)],
      glow: Math.random() > 0.5,
    });
  }
}

function spawnEngineParticles() {
  if (Math.random() > 0.6) return;
  const count = 2;
  for (let i = 0; i < count; i++) {
    if (particles.length >= CFG.MAX_PARTICLES) particles.shift();
    particles.push({
      x: ship.x + (Math.random()-0.5)*8,
      y: ship.y + 8 + (Math.random()-0.5)*4,
      z: ship.z - 10,
      vx: (Math.random()-0.5)*0.6,
      vy: Math.random()*0.4 + 0.3,
      vz: -(Math.random()*2 + 1),
      life: 1.0,
      decay: 0.045 + Math.random()*0.03,
      r: Math.random()*2.5+1,
      color: Math.random()>0.4 ? '#00aaff' : Math.random()>0.5 ? '#00ffff' : '#ffffff',
      glow: true,
    });
  }
}

// ── LASER ─────────────────────────────────────────────────
function fireLaser() {
  const now = performance.now();
  const cooldown = fireRateBoost ? CFG.FIRE_COOLDOWN_BASE * 0.35 : CFG.FIRE_COOLDOWN_BASE;
  if (now - lastFireTime < cooldown) return;
  lastFireTime = now;
  if (lasers.length >= CFG.MAX_LASERS) lasers.shift();
  lasers.push({
    x: ship.x, y: ship.y - 5, z: ship.z,
    vz: 28 * (timeSlow ? 0.45 : 1),
    life: 1.0,
    color: fireRateBoost ? '#ff00ff' : '#00ffff',
  });
  // secondary spread when fire boost
  if (fireRateBoost) {
    for (let s = -1; s <= 1; s += 2) {
      lasers.push({
        x: ship.x + s * 14, y: ship.y - 5, z: ship.z,
        vx: s * 0.4,
        vz: 26 * (timeSlow ? 0.45 : 1),
        life: 1.0,
        color: '#ff00cc',
      });
    }
  }
}

// ── POWER-UP ──────────────────────────────────────────────
function spawnPowerUp() {
  const types = ['shield','firerate','timeslow'];
  const t = types[Math.floor(Math.random()*types.length)];
  powerUps.push({
    x: (Math.random()-0.5)*1400,
    y: (Math.random()-0.5)*600,
    z: (Math.random()*600+500),
    type: t,
    rot: 0,
    rotSpd: 0.04 + Math.random()*0.04,
    radius: 16,
    life: 1.0,
    pulse: 0,
  });
}

// ── ANOMALY ──────────────────────────────────────────────
function spawnAnomaly() {
  anomalies.push({
    x: (Math.random()-0.5)*1800,
    y: (Math.random()-0.5)*800,
    z: Math.random()*1000+600,
    vz: -(1.5 + wave*0.15),
    radius: 50 + Math.random()*60,
    rot: 0, rotSpd: 0.01,
    life: 1.0,
    decay: 0.00015,
    hue: Math.random()*60 + 260, // purple-ish
    pulse: 0,
  });
}

// ── FLOAT TEXT ────────────────────────────────────────────
function spawnFloatText(x, y, z, text, color) {
  floatTexts.push({ x, y, z, text, color: color||'#fff', life: 1.0, vy: -0.8 });
}

// ── SHAKE ────────────────────────────────────────────────
function addShake(mag) {
  shakeMag = Math.max(shakeMag, mag);
}

// ── INIT GAME ─────────────────────────────────────────────
function startGame() {
  document.getElementById('titleScreen').style.display = 'none';
  document.getElementById('gameOverScreen').style.display = 'none';
  score = 0; lives = 3; kills = 0; wave = 1;
  health = 100; shield = 0;
  combo = 0; comboTimer = 0;
  waveTimer = 0; powerUpTimer = 0;
  timeSlow = false; fireRateBoost = false; shieldActive = false;
  shakeX = 0; shakeY = 0; shakeMag = 0;
  cameraX = 0; cameraY = 0; targetCamX = 0; targetCamY = 0;
  totalGameTime = 0;
  invincibleTimer = 0;
  ship.x = 0; ship.y = 0; ship.z = 0;
  ship.vx = 0; ship.vy = 0;
  ship.dead = false; ship.blinkTimer = 0;
  asteroids = []; lasers = []; particles = []; powerUps = []; anomalies = []; floatTexts = [];
  for (let i = 0; i < CFG.ASTEROID_INIT; i++) asteroids.push(spawnAsteroid());
  initStars();
  gameState = 'playing';
  updateHUD();
}

function gameOver() {
  gameState = 'dead';
  addShake(30);
  spawnParticles(ship.x, ship.y, ship.z, 80, ['#ff003c','#ff6600','#ffee00','#ffffff'], 2);
  document.getElementById('gameOverScore').textContent =
    `SCORE: ${score.toLocaleString()}  |  WAVE: ${wave}  |  KILLS: ${kills}`;
  setTimeout(() => {
    document.getElementById('gameOverScreen').style.display = 'flex';
  }, 1800);
}

// ── UPDATE HUD ────────────────────────────────────────────
function updateHUD() {
  document.getElementById('scoreVal').textContent = score.toLocaleString();
  document.getElementById('waveVal').textContent = wave;
  document.getElementById('killVal').textContent = kills;
  document.getElementById('livesVal').textContent = lives;
  document.getElementById('healthFill').style.width = health + '%';
  document.getElementById('shieldFill').style.width = shield + '%';
  // Power-up slots
  const puTypes = ['shield','firerate','timeslow'];
  const puTimers = [shieldTimer, fireRateTimer, timeSlowTimer];
  const puMax = [8000, 8000, 6000];
  puTypes.forEach((t,i) => {
    const el = document.getElementById('pu'+i);
    if (puTimers[i] > 0) {
      el.classList.add('active');
      let bar = el.querySelector('.pu-timer');
      if (!bar) { bar = document.createElement('div'); bar.className='pu-timer'; el.appendChild(bar); }
      bar.style.width = (puTimers[i]/puMax[i]*100)+'%';
    } else {
      el.classList.remove('active');
      const bar = el.querySelector('.pu-timer');
      if (bar) bar.style.width = '0%';
    }
  });
}

// ══════════════════════════════════════════════════════════
//  MAIN UPDATE LOOP
// ══════════════════════════════════════════════════════════
function update(ts) {
  dt = Math.min((ts - lastTime) / 16.67, 3);
  lastTime = ts;
  if (gameState !== 'playing') return;

  const speedMul = timeSlow ? 0.38 : 1;
  totalGameTime += dt * 16.67;

  // FPS
  frameCount++;
  if (ts - lastFpsTime > 1000) {
    fps = Math.round(frameCount * 1000 / (ts - lastFpsTime));
    document.getElementById('fpsCounter').textContent = fps + ' FPS';
    frameCount = 0; lastFpsTime = ts;
  }

  // Timers
  if (timeSlow) { timeSlowTimer -= dt*16.67; if (timeSlowTimer<=0){timeSlow=false;timeSlowTimer=0;} }
  if (fireRateBoost){ fireRateTimer -= dt*16.67; if(fireRateTimer<=0){fireRateBoost=false;fireRateTimer=0;} }
  if (shieldActive){ shieldTimer -= dt*16.67; if(shieldTimer<=0){shieldActive=false;shieldTimer=0;shield=0;} }
  if (invincibleTimer > 0) invincibleTimer -= dt*16.67;

  // Wave
  waveTimer += dt*16.67;
  if (waveTimer >= CFG.WAVE_INTERVAL) {
    waveTimer = 0;
    wave++;
    showWaveAlert('WAVE ' + wave);
    const newCount = CFG.ASTEROID_INIT + wave * 2;
    while (asteroids.length < newCount) asteroids.push(spawnAsteroid());
    if (wave % 3 === 0) spawnAnomaly();
  }

  // Power-up spawn
  powerUpTimer += dt*16.67;
  if (powerUpTimer >= CFG.POWER_UP_INTERVAL) {
    powerUpTimer = 0;
    if (powerUps.length < 3) spawnPowerUp();
  }

  // Combo decay
  if (comboTimer > 0) { comboTimer -= dt*16.67; if(comboTimer<=0){combo=0;comboTimer=0;} }
  if (comboDisplayTimer > 0) comboDisplayTimer -= dt*16.67;

  // Wave alert
  if (waveAlertTimer > 0) waveAlertTimer -= dt*16.67;

  // ── CAMERA ─────────────────────────────────────────────
  if (!input.isMobile) {
    const mxRel = (input.mouse.x / W - 0.5); // -0.5 to 0.5
    const myRel = (input.mouse.y / H - 0.5);
    targetCamX = -mxRel * 180;
    targetCamY = -myRel * 80;
  } else {
    targetCamX = -input.gyro.gamma * 3.5;
    targetCamY = -input.gyro.beta * 1.8;
    targetCamX = Math.max(-120, Math.min(120, targetCamX));
    targetCamY = Math.max(-60, Math.min(60, targetCamY));
  }
  cameraX += (targetCamX - cameraX) * 0.055 * dt;
  cameraY += (targetCamY - cameraY) * 0.055 * dt;

  // ── SHAKE ───────────────────────────────────────────────
  if (shakeMag > 0.2) {
    shakeX = (Math.random()-0.5)*2 * shakeMag;
    shakeY = (Math.random()-0.5)*2 * shakeMag;
    shakeMag *= CFG.SHAKE_DECAY;
  } else { shakeX=0; shakeY=0; shakeMag=0; }

  // ── SHIP MOVEMENT ──────────────────────────────────────
  if (!ship.dead) {
    const tx = input.isMobile
      ? (input.touch.active ? (input.touch.x - W/2) * 0.012 : input.gyro.gamma * 0.5)
      : (input.mouse.x / W - 0.5) * 2;
    const ty = input.isMobile
      ? (input.touch.active ? (input.touch.y - H/2) * 0.008 : (input.gyro.beta-10) * 0.3)
      : (input.mouse.y / H - 0.5) * 2;

    const targetX = tx * 420;
    const targetY = ty * 240;
    ship.vx += (targetX - ship.x) * 0.018 * dt;
    ship.vy += (targetY - ship.y) * 0.016 * dt;
    ship.vx *= Math.pow(0.84, dt);
    ship.vy *= Math.pow(0.84, dt);
    ship.x += ship.vx * dt;
    ship.y += ship.vy * dt;
    ship.x = Math.max(-480, Math.min(480, ship.x));
    ship.y = Math.max(-260, Math.min(260, ship.y));
    ship.roll = -ship.vx * 0.012;
    ship.pitch = ship.vy * 0.008;
    spawnEngineParticles();
  }

  // Auto-fire
  if (input.firing || input.mouse.down) fireLaser();

  // ── STARS ──────────────────────────────────────────────
  for (let i = stars.length-1; i >= 0; i--) {
    const s = stars[i];
    s.z -= s.spd * speedMul * dt * 1.2;
    if (s.z < 1) {
      s.z = 1400 + Math.random()*400;
      s.x = (Math.random()-0.5)*2200;
      s.y = (Math.random()-0.5)*1400;
    }
  }

  // ── LASERS ────────────────────────────────────────────
  for (let i = lasers.length-1; i >= 0; i--) {
    const l = lasers[i];
    l.z += l.vz * speedMul * dt;
    if (l.vx) l.x += l.vx * dt * speedMul * 10;
    l.life -= 0.012 * dt;
    if (l.z > 2000 || l.life <= 0) { lasers.splice(i,1); continue; }
    // Hit asteroids
    let hit = false;
    for (let j = asteroids.length-1; j >= 0; j--) {
      const a = asteroids[j];
      const dx = l.x - a.x, dy = l.y - a.y, dz = l.z - a.z;
      if (Math.abs(dz) < 60 && dx*dx+dy*dy < (a.radius+8)*(a.radius+8)) {
        a.hp--;
        spawnParticles(a.x, a.y, a.z, 12, ['#ff8800','#ffaa00','#ff4400','#ffff00'], 1.5);
        addShake(4);
        if (a.hp <= 0) {
          destroyAsteroid(a, j);
        } else {
          spawnFloatText(a.x, a.y-a.radius, a.z, 'HIT', '#ffaa00');
        }
        lasers.splice(i,1);
        hit = true;
        break;
      }
    }
    if (hit) continue;
  }

  // ── ASTEROIDS ─────────────────────────────────────────
  for (let i = asteroids.length-1; i >= 0; i--) {
    const a = asteroids[i];
    a.x += a.vx * speedMul * dt;
    a.y += a.vy * speedMul * dt;
    a.z += a.vz * speedMul * dt;
    a.rot += a.rotSpd * dt;
    if (a.z < -200 || a.z > 2500) {
      asteroids.splice(i,1);
      asteroids.push(spawnAsteroid());
      continue;
    }
    // Ship collision
    if (!ship.dead && invincibleTimer <= 0) {
      const dx = ship.x-a.x, dy=ship.y-a.y, dz=ship.z-a.z;
      if (Math.abs(dz)<80 && dx*dx+dy*dy < (a.radius+18)*(a.radius+18)) {
        if (shieldActive) {
          shield -= 30;
          if (shield < 0) { health += shield; shield = 0; shieldActive=false; shieldTimer=0; }
          addShake(10);
          spawnParticles(ship.x,ship.y,ship.z,25,['#00aaff','#00ffff','#ffffff'],1.8);
        } else {
          health -= 30;
          addShake(16);
          spawnParticles(ship.x,ship.y,ship.z,20,['#ff003c','#ff6600','#ffee00'],1.5);
          invincibleTimer = 1800;
        }
        spawnFloatText(ship.x,ship.y-30,ship.z,'-30','#ff003c');
        destroyAsteroid(a, i);
        if (health <= 0) {
          health = 0;
          lives--;
          if (lives <= 0) { ship.dead=true; updateHUD(); setTimeout(gameOver,600); return; }
          else { health = 100; invincibleTimer = 3000; showWaveAlert('DAMAGE!'); }
        }
        updateHUD();
      }
    }
  }

  // ── POWER-UPS ─────────────────────────────────────────
  for (let i = powerUps.length-1; i >= 0; i--) {
    const p = powerUps[i];
    p.z -= (1.5 + wave*0.08) * speedMul * dt;
    p.rot += p.rotSpd * dt;
    p.pulse = (p.pulse + 0.06*dt) % (Math.PI*2);
    p.life -= 0.0004 * dt;
    if (p.z < -200 || p.life <= 0) { powerUps.splice(i,1); continue; }
    // collect
    if (!ship.dead) {
      const dx=ship.x-p.x, dy=ship.y-p.y, dz=ship.z-p.z;
      if (Math.abs(dz)<80 && dx*dx+dy*dy < (p.radius+24)*(p.radius+24)) {
        applyPowerUp(p.type);
        spawnParticles(p.x,p.y,p.z,30,powerUpColors(p.type),1.6);
        powerUps.splice(i,1);
        continue;
      }
    }
  }

  // ── ANOMALIES ─────────────────────────────────────────
  for (let i = anomalies.length-1; i >= 0; i--) {
    const a = anomalies[i];
    a.z += a.vz * speedMul * dt;
    a.rot += a.rotSpd * dt;
    a.pulse = (a.pulse||0) + 0.03*dt;
    a.life -= a.decay * dt;
    if (a.z < -300 || a.life<=0) { anomalies.splice(i,1); continue; }
    if (!ship.dead && invincibleTimer<=0) {
      const dx=ship.x-a.x,dy=ship.y-a.y,dz=ship.z-a.z;
      if (Math.abs(dz)<100 && dx*dx+dy*dy<(a.radius+20)*(a.radius+20)) {
        health -= 2 * dt;
        addShake(2);
        if (health<=0){ health=0; lives--; updateHUD();
          if(lives<=0){ship.dead=true;setTimeout(gameOver,600);return;}
          else{health=100;invincibleTimer=3000;}
        }
      }
    }
  }

  // ── PARTICLES ─────────────────────────────────────────
  for (let i = particles.length-1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * speedMul * dt;
    p.y += p.vy * speedMul * dt;
    p.z += p.vz * speedMul * dt;
    p.life -= p.decay * dt;
    if (p.life <= 0) particles.splice(i,1);
  }

  // ── FLOAT TEXTS ───────────────────────────────────────
  for (let i = floatTexts.length-1; i>=0; i--) {
    const f = floatTexts[i];
    f.y += f.vy * dt;
    f.life -= 0.025 * dt;
    if (f.life<=0) floatTexts.splice(i,1);
  }

  updateHUD();
}

function destroyAsteroid(ast, idx) {
  kills++;
  const pts = (ast.tier===0?150:ast.tier===1?75:30) * (combo>1?combo:1);
  score += pts;
  combo++;
  comboTimer = 2800;
  comboDisplayTimer = 1200;
  spawnParticles(ast.x,ast.y,ast.z,
    ast.tier===0?55:ast.tier===1?35:18,
    ['#ff8800','#ff4400','#ffaa00','#ffff00','#ff0000','#ffffff'],1.8);
  addShake(ast.tier===0?12:ast.tier===1?7:3);
  spawnFloatText(ast.x,ast.y-ast.radius,ast.z,'+'+pts,'#ffee00');
  if (ast.tier > 0) {
    // break into debris
    for (let k=0;k<2+(ast.tier);k++) {
      asteroids.push(spawnAsteroid(
        ast.x+(Math.random()-0.5)*ast.radius,
        ast.y+(Math.random()-0.5)*ast.radius,
        ast.z,
        ast.radius*0.45,
        (Math.random()-0.5)*3,
        (Math.random()-0.5)*2.5,
        ast.vz + (Math.random()-0.5)*2,
        ast.tier-1
      ));
    }
  }
  asteroids.splice(idx,1);
  asteroids.push(spawnAsteroid()); // maintain field
}

function applyPowerUp(type) {
  if (type==='shield') { shieldActive=true; shieldTimer=8000; shield=100; spawnFloatText(ship.x,ship.y-40,ship.z,'SHIELD!','#00ccff'); }
  if (type==='firerate') { fireRateBoost=true; fireRateTimer=8000; spawnFloatText(ship.x,ship.y-40,ship.z,'RAPID FIRE!','#ff00ff'); }
  if (type==='timeslow') { timeSlow=true; timeSlowTimer=6000; spawnFloatText(ship.x,ship.y-40,ship.z,'TIME SLOW!','#aaaaff'); }
  updateHUD();
}

function powerUpColors(type) {
  if(type==='shield') return ['#00aaff','#00ffff','#ffffff'];
  if(type==='firerate') return ['#ff00ff','#ff66ff','#ffaaff'];
  return ['#8888ff','#aaaaff','#ffffff'];
}

function showWaveAlert(text) {
  const el = document.getElementById('waveAlert');
  el.textContent = text;
  el.style.opacity = '1';
  waveAlertTimer = 2200;
  setTimeout(()=>{ el.style.opacity='0'; }, 2000);
}

// ══════════════════════════════════════════════════════════
//  RENDER
// ══════════════════════════════════════════════════════════
function render() {
  ctx.clearRect(0,0,W,H);

  // Background
  const bgGrad = ctx.createRadialGradient(cx,cy,0,cx,cy,Math.max(W,H)*0.7);
  bgGrad.addColorStop(0,'#00000e');
  bgGrad.addColorStop(1,'#000003');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0,0,W,H);

  ctx.save();
  ctx.translate(shakeX, shakeY);

  // ── STARS ──────────────────────────────────────────────
  for (const s of stars) {
    const p = project(s.x, s.y, s.z);
    if (!p || p.sx<-10||p.sx>W+10||p.sy<-10||p.sy>H+10) continue;
    const brightness = Math.min(1, p.scale * 0.8);
    const radius = Math.max(0.4, p.scale * 1.2);
    if (s.hue !== 0) {
      ctx.fillStyle = `hsla(${s.hue}, 100%, 85%, ${brightness})`;
    } else {
      ctx.fillStyle = `rgba(255,255,255,${brightness * 0.85})`;
    }
    ctx.beginPath();
    ctx.arc(p.sx, p.sy, radius, 0, Math.PI*2);
    ctx.fill();
  }

  // ── ANOMALIES ─────────────────────────────────────────
  for (const a of anomalies) {
    const p = project(a.x, a.y, a.z);
    if (!p) continue;
    const r = a.radius * p.scale * 1.2;
    const pulse = Math.sin(a.pulse) * 0.25 + 0.75;
    ctx.save();
    ctx.globalAlpha = Math.min(a.life, 0.55) * pulse;
    const ag = ctx.createRadialGradient(p.sx, p.sy, 0, p.sx, p.sy, r);
    ag.addColorStop(0, `hsla(${a.hue},100%,70%,0.5)`);
    ag.addColorStop(0.5, `hsla(${a.hue},90%,45%,0.3)`);
    ag.addColorStop(1, `hsla(${a.hue},80%,20%,0)`);
    ctx.fillStyle = ag;
    ctx.beginPath();
    ctx.arc(p.sx, p.sy, r, 0, Math.PI*2);
    ctx.fill();
    // rings
    ctx.globalAlpha *= 0.7;
    ctx.strokeStyle = `hsla(${a.hue},100%,70%,0.8)`;
    ctx.lineWidth = 1.5;
    for (let ri=0;ri<3;ri++) {
      ctx.beginPath();
      ctx.arc(p.sx, p.sy, r*(0.3+ri*0.3), 0, Math.PI*2);
      ctx.stroke();
    }
    ctx.restore();
  }

  // ── PARTICLES ─────────────────────────────────────────
  for (const par of particles) {
    const p = project(par.x, par.y, par.z);
    if (!p) continue;
    const alpha = par.life * 0.9;
    const r = Math.max(0.5, par.r * p.scale * 0.8);
    ctx.globalAlpha = alpha;
    if (par.glow) {
      ctx.shadowBlur = 8;
      ctx.shadowColor = par.color;
    }
    ctx.fillStyle = par.color;
    ctx.beginPath();
    ctx.arc(p.sx, p.sy, r, 0, Math.PI*2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }
  ctx.globalAlpha = 1;

  // ── POWER-UPS ─────────────────────────────────────────
  const puGlyphs = {shield:'⬡',firerate:'◆',timeslow:'⏱'};
  const puCols = {shield:'#00ccff',firerate:'#ff00ff',timeslow:'#8888ff'};
  for (const pu of powerUps) {
    const p = project(pu.x, pu.y, pu.z);
    if (!p || p.sx<-50||p.sx>W+50||p.sy<-50||p.sy>H+50) continue;
    const pulsR = Math.sin(pu.pulse)*0.15+1;
    const r = pu.radius * p.scale * pulsR;
    const col = puCols[pu.type];
    ctx.save();
    ctx.translate(p.sx, p.sy);
    ctx.rotate(pu.rot);
    // glow
    ctx.shadowBlur = 20 + Math.sin(pu.pulse)*8;
    ctx.shadowColor = col;
    ctx.strokeStyle = col;
    ctx.lineWidth = 2 * p.scale;
    ctx.globalAlpha = pu.life * 0.9;
    // hexagon
    ctx.beginPath();
    for (let k=0;k<6;k++) {
      const a = k/6*Math.PI*2 - Math.PI/6;
      k===0 ? ctx.moveTo(Math.cos(a)*r, Math.sin(a)*r)
            : ctx.lineTo(Math.cos(a)*r, Math.sin(a)*r);
    }
    ctx.closePath();
    ctx.stroke();
    // inner fill
    ctx.globalAlpha = pu.life*0.3;
    ctx.fillStyle = col;
    ctx.fill();
    ctx.globalAlpha = pu.life*0.95;
    ctx.shadowBlur = 0;
    ctx.font = `bold ${Math.max(8,r*1.1)}px Arial`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = col;
    ctx.fillText(puGlyphs[pu.type], 0, 0);
    ctx.restore();
  }
  ctx.globalAlpha = 1;

  // ── ASTEROIDS ─────────────────────────────────────────
  const astColors0 = ['#ff4422','#ff6644','#ff2200'];
  const astColors1 = ['#ff8844','#ffaa66','#ff6622'];
  const astColors2 = ['#ffcc88','#ffaa55','#ffdd99'];
  for (const ast of asteroids) {
    const p = project(ast.x, ast.y, ast.z);
    if (!p || p.sx<-100||p.sx>W+100||p.sy<-100||p.sy>H+100) continue;
    const r = ast.radius * p.scale;
    if (r < 0.5) continue;
    ctx.save();
    ctx.translate(p.sx, p.sy);
    ctx.rotate(ast.rot);
    const cols = ast.tier===0?astColors0:ast.tier===1?astColors1:astColors2;
    // body
    ctx.beginPath();
    const verts = ast.verts;
    ctx.moveTo(verts[0][0]*r, verts[0][1]*r);
    for (let vi=1;vi<verts.length;vi++) ctx.lineTo(verts[vi][0]*r, verts[vi][1]*r);
    ctx.closePath();
    // fill with gradient
    const ag2 = ctx.createRadialGradient(-r*0.2,-r*0.2,0,0,0,r*1.2);
    ag2.addColorStop(0,cols[1]);
    ag2.addColorStop(0.6,cols[0]);
    ag2.addColorStop(1,cols[2]);
    ctx.fillStyle = ag2;
    ctx.shadowBlur = 6;
    ctx.shadowColor = cols[0];
    ctx.fill();
    // edge
    ctx.strokeStyle = 'rgba(255,200,150,0.3)';
    ctx.lineWidth = 1;
    ctx.stroke();
    // dither-like surface lines
    if (r > 8) {
      ctx.globalAlpha = 0.18;
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 0.7;
      for (let dl=0;dl<3;dl++) {
        const a1=(dl/3)*Math.PI*1.5+ast.rot*0.3, len=r*0.7;
        ctx.beginPath();
        ctx.moveTo(Math.cos(a1)*r*0.3, Math.sin(a1)*r*0.3);
        ctx.lineTo(Math.cos(a1+0.6)*len, Math.sin(a1+0.6)*len);
        ctx.stroke();
      }
      ctx.globalAlpha = 1;
    }
    ctx.shadowBlur = 0;
    ctx.restore();
  }

  // ── LASERS ────────────────────────────────────────────
  for (const l of lasers) {
    const p1 = project(l.x, l.y, l.z);
    const p2 = project(l.x + (l.vx||0)*3, l.y, l.z - 32);
    if (!p1 || !p2) continue;
    ctx.save();
    ctx.globalAlpha = l.life;
    ctx.strokeStyle = l.color;
    ctx.lineWidth = Math.max(1.5, p1.scale * 4);
    ctx.shadowBlur = 14;
    ctx.shadowColor = l.color;
    ctx.beginPath();
    ctx.moveTo(p1.sx, p1.sy);
    ctx.lineTo(p2.sx, p2.sy);
    ctx.stroke();
    // bright core
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = Math.max(0.5, p1.scale * 1.5);
    ctx.shadowBlur = 4;
    ctx.beginPath();
    ctx.moveTo(p1.sx, p1.sy);
    ctx.lineTo(p2.sx, p2.sy);
    ctx.stroke();
    ctx.shadowBlur = 0;
    ctx.restore();
  }
  ctx.globalAlpha = 1;

  // ── SHIP ──────────────────────────────────────────────
  if (!ship.dead && (invincibleTimer<=0 || Math.floor(invincibleTimer/120)%2===0)) {
    const sp = project(ship.x, ship.y, ship.z);
    if (sp) {
      const sc = sp.scale * 1.4;
      ctx.save();
      ctx.translate(sp.sx + shakeX*0.5, sp.sy + shakeY*0.5);
      ctx.rotate(ship.roll);
      const shipCol = '#00ffff';
      // Engine glow
      const engGlow = ctx.createRadialGradient(0, 14*sc, 0, 0, 14*sc, 28*sc);
      engGlow.addColorStop(0,'rgba(0,120,255,0.9)');
      engGlow.addColorStop(0.4,'rgba(0,60,200,0.4)');
      engGlow.addColorStop(1,'rgba(0,0,100,0)');
      ctx.fillStyle = engGlow;
      ctx.beginPath(); ctx.ellipse(0, 18*sc, 16*sc, 18*sc, 0, 0, Math.PI*2); ctx.fill();
      // Ship body — fuselage
      ctx.shadowBlur = 12; ctx.shadowColor = shipCol;
      ctx.strokeStyle = shipCol;
      ctx.fillStyle = 'rgba(0,40,60,0.85)';
      ctx.lineWidth = 1.5*sc;
      ctx.beginPath();
      ctx.moveTo(0, -22*sc);
      ctx.lineTo(14*sc, 12*sc);
      ctx.lineTo(8*sc, 16*sc);
      ctx.lineTo(0, 10*sc);
      ctx.lineTo(-8*sc, 16*sc);
      ctx.lineTo(-14*sc, 12*sc);
      ctx.closePath();
      ctx.fill(); ctx.stroke();
      // Wings
      ctx.beginPath();
      ctx.moveTo(14*sc, 12*sc);
      ctx.lineTo(28*sc, 22*sc);
      ctx.lineTo(18*sc, 28*sc);
      ctx.lineTo(8*sc, 16*sc);
      ctx.closePath();
      ctx.fillStyle='rgba(0,30,50,0.9)';
      ctx.fill(); ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(-14*sc, 12*sc);
      ctx.lineTo(-28*sc, 22*sc);
      ctx.lineTo(-18*sc, 28*sc);
      ctx.lineTo(-8*sc, 16*sc);
      ctx.closePath();
      ctx.fill(); ctx.stroke();
      // Cockpit
      ctx.fillStyle='rgba(0,220,255,0.4)';
      ctx.beginPath();
      ctx.ellipse(0, -10*sc, 5*sc, 8*sc, 0, 0, Math.PI*2);
      ctx.fill(); ctx.stroke();
      // Shield bubble
      if (shieldActive) {
        const shieldAlpha = 0.15 + Math.sin(totalGameTime*0.008)*0.08;
        ctx.globalAlpha = shieldAlpha + 0.2;
        ctx.strokeStyle = '#00aaff';
        ctx.lineWidth = 2*sc;
        ctx.shadowColor = '#00aaff';
        ctx.shadowBlur = 18;
        ctx.beginPath();
        ctx.arc(0, 0, 38*sc, 0, Math.PI*2);
        ctx.stroke();
        ctx.globalAlpha = shieldAlpha;
        const sg = ctx.createRadialGradient(0,0,0,0,0,38*sc);
        sg.addColorStop(0,'rgba(0,150,255,0)');
        sg.addColorStop(1,'rgba(0,100,255,0.25)');
        ctx.fillStyle = sg;
        ctx.fill();
        ctx.globalAlpha = 1;
      }
      ctx.shadowBlur = 0;
      ctx.restore();
    }
  }

  // ── FLOAT TEXTS ───────────────────────────────────────
  for (const ft of floatTexts) {
    const p = project(ft.x, ft.y, ft.z);
    if (!p) continue;
    ctx.save();
    ctx.globalAlpha = ft.life;
    ctx.font = `bold ${Math.max(10, 14*p.scale)}px 'Orbitron', monospace`;
    ctx.fillStyle = ft.color;
    ctx.shadowBlur = 10;
    ctx.shadowColor = ft.color;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(ft.text, p.sx, p.sy);
    ctx.shadowBlur = 0;
    ctx.restore();
  }
  ctx.globalAlpha = 1;

  // ── COMBO DISPLAY ─────────────────────────────────────
  if (combo > 1 && comboDisplayTimer > 0) {
    const alpha = Math.min(1, comboDisplayTimer/400);
    const el = document.getElementById('combo');
    el.style.opacity = alpha;
    el.textContent = `×${combo} COMBO`;
  } else {
    document.getElementById('combo').style.opacity = 0;
  }

  ctx.restore(); // shake

  // ── GRID FLOOR EFFECT ─────────────────────────────────
  renderGridFloor();
}

function renderGridFloor() {
  const gridZ = 400;
  const gridLines = 12;
  const gridW = 1200;
  const gridH = 600;
  ctx.save();
  ctx.globalAlpha = 0.07;
  ctx.strokeStyle = '#00ffff';
  ctx.lineWidth = 0.7;
  for (let i=0;i<=gridLines;i++) {
    const x = -gridW/2 + i*(gridW/gridLines);
    const p1 = project(x, gridH*0.5, gridZ);
    const p2 = project(x, gridH*0.5, gridZ + 1200);
    if (p1&&p2) { ctx.beginPath(); ctx.moveTo(p1.sx,p1.sy); ctx.lineTo(p2.sx,p2.sy); ctx.stroke(); }
  }
  for (let j=0;j<=10;j++) {
    const z2 = gridZ + j*120;
    const p1 = project(-gridW/2, gridH*0.5, z2);
    const p2 = project(gridW/2, gridH*0.5, z2);
    if (p1&&p2) { ctx.beginPath(); ctx.moveTo(p1.sx,p1.sy); ctx.lineTo(p2.sx,p2.sy); ctx.stroke(); }
  }
  ctx.restore();
}

// ══════════════════════════════════════════════════════════
//  MAIN LOOP
// ══════════════════════════════════════════════════════════
function loop(ts) {
  update(ts);
  render();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// ══════════════════════════════════════════════════════════
//  INPUT EVENTS
// ══════════════════════════════════════════════════════════
document.addEventListener('mousemove', e => {
  input.mouse.x = e.clientX;
  input.mouse.y = e.clientY;
  const ch = document.getElementById('crosshair');
  ch.style.left = e.clientX + 'px';
  ch.style.top  = e.clientY + 'px';
});

document.addEventListener('mousedown', e => {
  if (e.button===0) { input.mouse.down=true; if(gameState==='playing') fireLaser(); }
});
document.addEventListener('mouseup', e => { if(e.button===0) input.mouse.down=false; });

document.addEventListener('keydown', e => {
  if (e.code==='Space'||e.key===' ') { e.preventDefault(); input.firing=true; }
});
document.addEventListener('keyup', e => {
  if (e.code==='Space'||e.key===' ') input.firing=false;
});

// Touch
document.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.touches[0];
  input.touch.active=true;
  input.touch.startX=input.touch.x=t.clientX;
  input.touch.startY=input.touch.y=t.clientY;
  if(gameState==='playing') fireLaser();
}, {passive:false});

document.addEventListener('touchmove', e => {
  e.preventDefault();
  const t = e.touches[0];
  input.touch.x=t.clientX;
  input.touch.y=t.clientY;
}, {passive:false});

document.addEventListener('touchend', e => {
  e.preventDefault();
  if(e.touches.length===0) input.touch.active=false;
}, {passive:false});

// Gyro
window.addEventListener('deviceorientation', e => {
  input.gyro.beta  = e.beta  || 0;  // tilt front/back
  input.gyro.gamma = e.gamma || 0;  // tilt left/right
});

// Continuous fire on hold
setInterval(() => {
  if (gameState==='playing' && (input.mouse.down||input.firing||input.touch.active)) fireLaser();
}, 60);

// Init title stars
initStars();
</script>
</body>
</html>
