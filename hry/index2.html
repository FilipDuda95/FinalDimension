<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>GET THE CAR // NEON CITY</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; font-family:'Courier New',monospace; }
canvas { display:block; }

#hud { position:fixed; top:0; left:0; width:100%; pointer-events:none; z-index:10; }

#score-box {
  position:absolute; top:16px; left:50%; transform:translateX(-50%);
  background:rgba(0,0,0,0.78); border:1px solid var(--nc);
  padding:6px 26px; color:var(--nc); font-size:11px; letter-spacing:3px;
  text-transform:uppercase; box-shadow:0 0 18px var(--nc4),inset 0 0 10px var(--nc1);
  transition: border-color .8s, box-shadow .8s, color .8s;
}
#score-val { font-size:25px; color:#fff; display:block; text-align:center; letter-spacing:6px; }

#state-label {
  position:absolute; top:86px; left:50%; transform:translateX(-50%);
  color:#f0f; font-size:11px; letter-spacing:4px; opacity:.9;
  text-shadow:0 0 8px #f0f; white-space:nowrap;
}
#car-badge {
  position:absolute; top:112px; left:50%; transform:translateX(-50%);
  color:#ff0; font-size:10px; letter-spacing:3px; opacity:0;
  transition:opacity .4s; text-shadow:0 0 8px #ff0;
}

#nitro-wrap {
  position:absolute; bottom:54px; right:28px;
  display:flex; flex-direction:column; align-items:flex-end; gap:3px;
}
#nitro-label { color:#f0f; font-size:9px; letter-spacing:3px; }
#nitro-bg { width:110px; height:6px; background:#f0f2; border:1px solid #f0f4; }
#nitro-bar { height:100%; width:100%; background:linear-gradient(90deg,#f0f,#ff0); transition:width .05s; }

#speed-bar-wrap {
  position:absolute; bottom:28px; right:28px;
  display:flex; flex-direction:column; align-items:flex-end; gap:3px;
}
#speed-label { color:#0ff; font-size:9px; letter-spacing:3px; }
#speed-bar-bg { width:110px; height:6px; background:#0ff2; border:1px solid #0ff4; }
#speed-bar { height:100%; width:0%; background:linear-gradient(90deg,#0ff,#f0f); transition:width .06s; }

#time-box {
  position:absolute; top:16px; left:16px;
  color:#aaa; font-size:9px; letter-spacing:3px; opacity:.7;
}
#time-val { font-size:20px; color:#fff; display:block; letter-spacing:4px; }

/* MINIMAP — bottom left */
#minimap-wrap {
  position:absolute; bottom:16px; left:16px; width:160px;
}
#minimap {
  display:block; width:160px; height:160px;
  border:1px solid #0ff4; box-shadow:0 0 14px #0ff3;
}
#minimap-label { text-align:center; color:#0ff7; font-size:9px; letter-spacing:3px; margin-top:2px; }

#police-alert {
  position:absolute; top:120px; left:50%; transform:translateX(-50%);
  color:#f00; font-size:11px; letter-spacing:5px; opacity:0;
  text-shadow:0 0 12px #f00; transition:opacity .3s;
}
#hint {
  position:absolute; bottom:28px; left:188px;
  color:#fff3; font-size:9px; letter-spacing:2px; line-height:2;
}

.overlay {
  position:fixed; inset:0; display:flex; flex-direction:column;
  align-items:center; justify-content:center; z-index:20; background:rgba(0,0,8,0.86);
}
.overlay h1 {
  font-size:clamp(28px,7vw,76px); letter-spacing:8px;
  color:#0ff; text-shadow:0 0 30px #0ff,0 0 80px #0ff8; margin-bottom:8px;
}
.overlay .sub { color:#f0f; font-size:clamp(10px,2vw,14px); letter-spacing:5px; margin-bottom:36px; text-shadow:0 0 10px #f0f; }
.overlay .btn {
  background:transparent; border:1px solid #0ff; color:#0ff;
  padding:11px 36px; font-family:'Courier New',monospace;
  font-size:12px; letter-spacing:4px; cursor:pointer; text-transform:uppercase;
  box-shadow:0 0 20px #0ff3; transition:all .2s; margin:6px;
}
.overlay .btn:hover { background:#0ff2; box-shadow:0 0 40px #0ffa; }
.overlay .btn.red { border-color:#f05; color:#f05; box-shadow:0 0 20px #f053; }
.overlay .btn.red:hover { background:#f052; }
#gameover-screen { display:none; }
#gameover-screen h1 { color:#f05; text-shadow:0 0 30px #f05,0 0 80px #f058; }
#gameover-screen .sub { color:#fa0; text-shadow:0 0 10px #fa0; }

/* CRT */
#crt {
  position:fixed; inset:0; pointer-events:none; z-index:35;
  background:repeating-linear-gradient(0deg,rgba(0,0,0,0.09) 0px,rgba(0,0,0,0.09) 1px,transparent 1px,transparent 3px);
}
#crt::after {
  content:''; position:absolute; inset:0;
  background:radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.65) 100%);
}
#flash { position:fixed;inset:0;opacity:0;pointer-events:none;z-index:28;transition:opacity .12s; }

:root { --nc:#0ff; --nc4:rgba(0,255,255,0.25); --nc1:rgba(0,255,255,0.06); }
</style>
</head>
<body>
<div id="crt"></div>
<div id="flash"></div>

<div id="hud">
  <div id="score-box">CARS DELIVERED <span id="score-val">0</span></div>
  <div id="state-label">ON FOOT // FIND A CAR</div>
  <div id="car-badge"></div>
  <div id="police-alert">⚠ POLICE CHASING ⚠</div>
  <div id="time-box">TIME<span id="time-val">20:00</span></div>
  <div id="minimap-wrap">
    <canvas id="minimap" width="160" height="160"></canvas>
    <div id="minimap-label">MINIMAP</div>
  </div>
  <div id="nitro-wrap">
    <div id="nitro-label">NITRO</div>
    <div id="nitro-bg"><div id="nitro-bar"></div></div>
  </div>
  <div id="speed-bar-wrap">
    <div id="speed-label">SPEED</div>
    <div id="speed-bar-bg"><div id="speed-bar"></div></div>
  </div>
  <div id="hint">
    HOLD → RUN / BRAKE &nbsp; DRAG → STEER<br>
    NEAR CAR → STEAL &nbsp; DBL-TAP → NITRO<br>
    GREEN GARAGE → DELIVER
  </div>
</div>

<div class="overlay" id="title-screen">
  <h1>GET THE CAR</h1>
  <div class="sub">// NEON CITY HEIST //</div>
  <button class="btn" id="start-btn">▶ START ENGINE</button>
  <div style="color:#fff3;font-size:9px;letter-spacing:3px;margin-top:18px;">DOUBLE-TAP = NITRO BOOST</div>
</div>

<div class="overlay" id="gameover-screen">
  <h1>WRECKED</h1>
  <div class="sub">// YOU DIDN'T MAKE IT //</div>
  <div style="color:#fff;font-size:13px;letter-spacing:3px;margin-bottom:28px;">
    CARS DELIVERED: <span id="final-score">0</span>
  </div>
  <button class="btn red" id="restart-btn">↺ TRY AGAIN</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
'use strict';
// ══════════════════════════════════════════════════════════════
//  GET THE CAR v4  —  Road Grid, Police Lights, Smart AI
// ══════════════════════════════════════════════════════════════

// ── Renderer ──
const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050510);
scene.fog = new THREE.Fog(0x050510,70,230);

const camera = new THREE.PerspectiveCamera(65,innerWidth/innerHeight,0.1,600);

window.addEventListener('resize',()=>{
  renderer.setSize(innerWidth,innerHeight);
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
});

// ── Lighting ──
const ambientLight = new THREE.AmbientLight(0x111133,2);
scene.add(ambientLight);
const sunLight = new THREE.DirectionalLight(0x4488ff,0.7);
sunLight.position.set(30,60,30);
scene.add(sunLight);

// ══════════════════════════════════════════════════════════════
//  WORLD LAYOUT
//  Blocks sit between road intersections.
//  Road centre lines are at multiples of STEP.
//  Each block occupies [roadCentre + ROAD/2 .. roadCentre + ROAD/2 + BLOCK].
//  Buildings are only placed inside block interiors, never on roads.
// ══════════════════════════════════════════════════════════════
const GRID = 20;        // number of blocks each axis
const ROAD = 10;        // road width (full, 2 lanes)
const BLOCK = 14;       // city block width
const STEP = ROAD+BLOCK;// grid repeat
const CITY_HALF = (GRID/2)*STEP;

// Half-widths for road zone check (anything within ROAD/2 of a grid line is road)
const ROAD_HALF = ROAD/2;

// Returns true if world (x,z) is on a road (within ROAD_HALF of any grid line)
function onRoad(x,z){
  const rx = ((x%STEP)+STEP)%STEP; // position inside one cell [0,STEP)
  const rz = ((z%STEP)+STEP)%STEP;
  return rx<ROAD_HALF||rx>(STEP-ROAD_HALF)||rz<ROAD_HALF||rz>(STEP-ROAD_HALF);
}

// Snap a point to the nearest road centre (intersection or mid-road)
function nearestRoadCentreX(x){ return Math.round(x/STEP)*STEP; }
function nearestRoadCentreZ(z){ return Math.round(z/STEP)*STEP; }

// ── Material helpers ──
const mat  = (c,e,i=0.4)=> new THREE.MeshLambertMaterial({color:c,emissive:e||c,emissiveIntensity:i});
const bMat = c=> new THREE.MeshBasicMaterial({color:c});
const wMat = c=> new THREE.MeshBasicMaterial({color:c,wireframe:true});

// ── Data ──
const buildingBoxes  = []; // {x,z,hw,hd}
const buildingMeshes = [];
const parkedCars     = []; // {mesh,x,z,stolen,color,neon,type}
const trafficList    = []; // {mesh,x,z,roadDirX,roadDirZ,speed,isPolice,stuckTimer,lightBlue,lightRed}

// ══════════════════════════════════════════════════════════════
//  CAR TYPES
// ══════════════════════════════════════════════════════════════
const CAR_TYPES=[
  {name:'SEDAN', maxSpd:.62,accel:.007,brake:.018,steer:.042,drift:.80,nitroMult:1.5,bW:2.0,bH:.8, bL:4.2},
  {name:'SPORT', maxSpd:.90,accel:.012,brake:.014,steer:.050,drift:.72,nitroMult:1.8,bW:1.8,bH:.65,bL:4.6},
  {name:'TRUCK', maxSpd:.44,accel:.005,brake:.025,steer:.030,drift:.90,nitroMult:1.3,bW:2.4,bH:1.1,bL:5.0},
  {name:'MUSCLE',maxSpd:.75,accel:.010,brake:.016,steer:.038,drift:.75,nitroMult:1.6,bW:2.1,bH:.85,bL:4.4},
  {name:'MINI',  maxSpd:.55,accel:.009,brake:.022,steer:.058,drift:.82,nitroMult:1.4,bW:1.6,bH:.72,bL:3.2},
];

const FOOT_WALK=0.025, FOOT_RUN=0.060;

// ══════════════════════════════════════════════════════════════
//  GROUND
// ══════════════════════════════════════════════════════════════
const ground=new THREE.Mesh(
  new THREE.PlaneGeometry(GRID*STEP*3,GRID*STEP*3),
  mat(0x080818,0x080818,0)
);
ground.rotation.x=-Math.PI/2; scene.add(ground);

// ══════════════════════════════════════════════════════════════
//  ROAD SURFACE — darker asphalt strips along every road
// ══════════════════════════════════════════════════════════════
(function buildRoads(){
  const roadMat=new THREE.MeshLambertMaterial({color:0x0a0a14,emissive:0x0a0a14,emissiveIntensity:0});
  for(let g=-GRID/2;g<=GRID/2;g++){
    // E-W strip
    const stripH=new THREE.Mesh(new THREE.PlaneGeometry(GRID*STEP*2,ROAD),roadMat);
    stripH.rotation.x=-Math.PI/2; stripH.position.set(0,0.01,g*STEP); scene.add(stripH);
    // N-S strip
    const stripV=new THREE.Mesh(new THREE.PlaneGeometry(ROAD,GRID*STEP*2),roadMat);
    stripV.rotation.x=-Math.PI/2; stripV.position.set(g*STEP,0.01,0); scene.add(stripV);
  }

  // ── Centre dividing line (yellow dashed) ──
  const divMat=new THREE.MeshBasicMaterial({color:0xffcc00});
  for(let g=-GRID/2;g<=GRID/2;g++){
    for(let i=-GRID/2;i<GRID/2;i++){
      const s=i*STEP+STEP/2;
      // Horizontal road centre dash
      const dh=new THREE.Mesh(new THREE.PlaneGeometry(3,.12),divMat);
      dh.rotation.x=-Math.PI/2; dh.position.set(s,.03,g*STEP); scene.add(dh);
      // Vertical road centre dash
      const dv=new THREE.Mesh(new THREE.PlaneGeometry(.12,3),divMat);
      dv.rotation.x=-Math.PI/2; dv.position.set(g*STEP,.03,s); scene.add(dv);
    }
  }

  // ── Lane edge lines (white) ──
  const laneMat=new THREE.MeshBasicMaterial({color:0x334466});
  for(let g=-GRID/2;g<=GRID/2;g++){
    [-ROAD/2+.6,ROAD/2-.6].forEach(off=>{
      for(let i=-GRID/2;i<GRID/2;i++){
        const s=i*STEP+STEP/2;
        const lh=new THREE.Mesh(new THREE.PlaneGeometry(2.5,.08),laneMat);
        lh.rotation.x=-Math.PI/2; lh.position.set(s,.025,g*STEP+off); scene.add(lh);
        const lv=new THREE.Mesh(new THREE.PlaneGeometry(.08,2.5),laneMat);
        lv.rotation.x=-Math.PI/2; lv.position.set(g*STEP+off,.025,s); scene.add(lv);
      }
    });
  }
})();

// ══════════════════════════════════════════════════════════════
//  CITY BUILDINGS  — only inside block interiors, never on roads
//  Garage area cleared: blocks around garagePos are skipped
// ══════════════════════════════════════════════════════════════
const garagePos=new THREE.Vector3(STEP*3,0,STEP*3);
const GARAGE_CLEAR=STEP*1.5; // radius around garage kept free of buildings

(function buildCity(){
  const cols =[0x001133,0x110022,0x002211,0x110011,0x221100,0x002233,0x330011];
  const neons=[0x00ffff, 0xff00ff,0x00ff88,0xff4400,0xffaa00,0x0088ff,0xff0088];

  for(let gx=-GRID/2;gx<GRID/2;gx++){
    for(let gz=-GRID/2;gz<GRID/2;gz++){
      // Block centre (between two road lines)
      // Road lines at gx*STEP and (gx+1)*STEP; block centre is at (gx+0.5)*STEP
      const blockCX=(gx+0.5)*STEP;
      const blockCZ=(gz+0.5)*STEP;

      // Skip if too close to garage
      if(Math.hypot(blockCX-garagePos.x,blockCZ-garagePos.z)<GARAGE_CLEAR) continue;
      // Skip centre start area
      if(Math.abs(gx)<1&&Math.abs(gz)<1) continue;

      // Place 1-3 buildings per block, strictly inside the block
      // Block interior: blockCentre ± (BLOCK/2 - margin)
      const innerHalf=(BLOCK/2)-1.5; // safe margin from road edge
      const cnt=1+Math.floor(Math.random()*3);
      for(let k=0;k<cnt;k++){
        const w=3+Math.random()*4.5, d=3+Math.random()*4.5;
        const h=5+Math.random()*24;
        // Random position inside block (clamped so building stays inside)
        const maxOff=innerHalf-Math.max(w,d)/2;
        if(maxOff<0) continue;
        const ox=(Math.random()-.5)*2*maxOff;
        const oz=(Math.random()-.5)*2*maxOff;
        const bx=blockCX+ox, bz=blockCZ+oz;

        const idx=Math.floor(Math.random()*7);
        const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mat(cols[idx],neons[idx],.15));
        m.position.set(bx,h/2,bz); scene.add(m);
        const wm=new THREE.Mesh(new THREE.BoxGeometry(w+.1,h+.1,d+.1),wMat(neons[idx]));
        wm.position.copy(m.position); scene.add(wm);
        buildingBoxes.push({x:bx,z:bz,hw:w/2+.1,hd:d/2+.1});
        buildingMeshes.push({mesh:m,wire:wm,neon:neons[idx]});
      }
    }
  }
})();

// ── Street lights at intersections ──
const streetLights=[];
(function(){
  for(let i=-8;i<=8;i+=2) for(let j=-8;j<=8;j+=2){
    if(Math.random()>.5) continue;
    const x=i*STEP+(ROAD/2+.5), z=j*STEP+(ROAD/2+.5);
    const pole=new THREE.Mesh(new THREE.BoxGeometry(.15,5,.15),mat(0x222222,0x333333,.1));
    pole.position.set(x,2.5,z); scene.add(pole);
    const col=Math.random()>.5?0x00ffff:0xff00ff;
    const hd=new THREE.Mesh(new THREE.BoxGeometry(.6,.2,.6),bMat(col));
    hd.position.set(x,5.2,z); scene.add(hd);
    const pl=new THREE.PointLight(col,.9,16);
    pl.position.set(x,5,z); scene.add(pl);
    streetLights.push({light:pl,color:col});
  }
})();

// ══════════════════════════════════════════════════════════════
//  GARAGE  — on road intersection, clearly marked
// ══════════════════════════════════════════════════════════════
const garageLight=new THREE.PointLight(0x00ff88,3,40);
(function makeGarage(){
  // Base platform
  const base=new THREE.Mesh(new THREE.BoxGeometry(10,.4,12),bMat(0x00ff88));
  base.position.set(garagePos.x,.2,garagePos.z); scene.add(base);
  // Floor neon cross
  const fh=new THREE.Mesh(new THREE.PlaneGeometry(10,.3),bMat(0x00ffcc));
  fh.rotation.x=-Math.PI/2; fh.position.set(garagePos.x,.41,garagePos.z); scene.add(fh);
  const fv=new THREE.Mesh(new THREE.PlaneGeometry(.3,12),bMat(0x00ffcc));
  fv.rotation.x=-Math.PI/2; fv.position.set(garagePos.x,.41,garagePos.z); scene.add(fv);
  // Pillars
  [[-4,5],[4,5],[-4,-5],[4,-5]].forEach(([ox,oz])=>{
    const p=new THREE.Mesh(new THREE.BoxGeometry(.5,6,.5),bMat(0x00ffcc));
    p.position.set(garagePos.x+ox,3,garagePos.z+oz); scene.add(p);
  });
  // Roof beam
  const roof=new THREE.Mesh(new THREE.BoxGeometry(9,.3,1),bMat(0x00ff88));
  roof.position.set(garagePos.x,6.1,garagePos.z-5); scene.add(roof);

  // ── 3D "GARAGE" sign letters (boxes spelling it out) ──
  // Using slim boxes for each letter block
  const signGroup=new THREE.Group();
  const lMat=new THREE.MeshBasicMaterial({color:0x00ff88});
  const lW=.5,lH=1.2,lD=.15;
  // We'll draw G-A-R-A-G-E as 6 rectangular blocks with different widths
  const letters=[
    {w:1.0,h:lH},{w:.8,h:lH},{w:.9,h:lH},{w:.8,h:lH},{w:1.0,h:lH},{w:.9,h:lH}
  ];
  let lx=-2.5;
  letters.forEach(l=>{
    const lb=new THREE.Mesh(new THREE.BoxGeometry(l.w,l.h,lD),lMat);
    lb.position.set(lx,0,0); signGroup.add(lb);
    // Neon glow wireframe
    const lbw=new THREE.Mesh(new THREE.BoxGeometry(l.w+.05,l.h+.05,lD+.05),wMat(0x00ffff));
    lbw.position.copy(lb.position); signGroup.add(lbw);
    lx+=l.w+.15;
  });
  signGroup.position.set(garagePos.x,7,garagePos.z-5.5);
  scene.add(signGroup);

  garageLight.position.set(garagePos.x,4,garagePos.z);
  scene.add(garageLight);
})();

// ══════════════════════════════════════════════════════════════
//  CAR FACTORY
// ══════════════════════════════════════════════════════════════
const CAR_COLORS=[
  [0x110022,0xff00ff],[0x001122,0x00ffff],[0x112200,0x00ff44],
  [0x220011,0xff2200],[0x221100,0xffaa00],[0x001133,0x0088ff],[0x221122,0xff88ff]
];

// makePolice=true adds light bar + POLICE text boxes on roof
function makeCar(x,z,color,neon,rot=0,type=CAR_TYPES[0],makePolice=false){
  const g=new THREE.Group();
  const {bW,bH,bL}=type;
  // Body
  const body=new THREE.Mesh(new THREE.BoxGeometry(bW,bH,bL),mat(color,neon,.3));
  body.position.y=bH/2+.2; g.add(body);
  // Cabin
  const cabH=bH*.85,cabL=bL*.5;
  const cab=new THREE.Mesh(new THREE.BoxGeometry(bW*.75,cabH,cabL),mat(color,neon,.55));
  cab.position.set(0,bH/2+.2+cabH/2,-.2); g.add(cab);
  // Wheels
  const wxOff=bW/2+.06;
  [[-wxOff,-bL*.35],[wxOff,-bL*.35],[-wxOff,bL*.35],[wxOff,bL*.35]].forEach(([wx,wz])=>{
    const w=new THREE.Mesh(new THREE.CylinderGeometry(.36,.36,.32,8),mat(0x111111,0x333333,.1));
    w.rotation.z=Math.PI/2; w.position.set(wx,.35,wz); g.add(w);
  });
  // Headlights
  [-bW*.3,bW*.3].forEach(ox=>{
    const hl=new THREE.Mesh(new THREE.BoxGeometry(.28,.18,.1),bMat(neon));
    hl.position.set(ox,bH/2+.2,bL/2+.05); g.add(hl);
  });
  // Taillights
  [-bW*.3,bW*.3].forEach(ox=>{
    const tl=new THREE.Mesh(new THREE.BoxGeometry(.25,.14,.1),bMat(0xff2200));
    tl.position.set(ox,bH/2+.2,-bL/2-.05); g.add(tl);
  });
  // Neon outline
  const ol=new THREE.Mesh(new THREE.BoxGeometry(bW+.1,bH+.1,bL+.1),wMat(neon));
  ol.position.y=bH/2+.2; g.add(ol);

  if(makePolice){
    // ── Light bar base ──
    const roofY=bH+.2+cabH+.1;
    const barBase=new THREE.Mesh(new THREE.BoxGeometry(bW*.6,.15,cabL*.5),bMat(0x111111));
    barBase.position.set(0,roofY,-.2); g.add(barBase);
    // Blue light cube (left)
    const lb=new THREE.Mesh(new THREE.BoxGeometry(.35,.3,.25),bMat(0x0044ff));
    lb.position.set(-bW*.2,roofY+.22,-.2); g.add(lb);
    // Red light cube (right)
    const lr=new THREE.Mesh(new THREE.BoxGeometry(.35,.3,.25),bMat(0xff2200));
    lr.position.set( bW*.2,roofY+.22,-.2); g.add(lr);
    // Store references for blinking (children indices 9,10)
    g.userData.lightBlue=lb;
    g.userData.lightRed =lr;

    // ── "POLICE" text — slim boxes on front & back of body ──
    const pMat=new THREE.MeshBasicMaterial({color:0xffffff});
    // Front text: 6 letter-boxes in a row
    const txtW=bW*.7,txtH=.18,txtD=.06;
    const frontTxt=new THREE.Mesh(new THREE.BoxGeometry(txtW,txtH,txtD),pMat);
    frontTxt.position.set(0,bH/2+.2,bL/2+.08); g.add(frontTxt);
    const backTxt=new THREE.Mesh(new THREE.BoxGeometry(txtW,txtH,txtD),pMat);
    backTxt.position.set(0,bH/2+.2,-bL/2-.08); g.add(backTxt);
    // Side stripes (blue/red)
    [-bL*.3,bL*.3].forEach(oz=>{
      const sB=new THREE.Mesh(new THREE.BoxGeometry(.07,.18,bL*.4),bMat(0x0044ff));
      sB.position.set( bW/2+.04,bH/2+.2,oz); g.add(sB);
      const sR=new THREE.Mesh(new THREE.BoxGeometry(.07,.18,bL*.4),bMat(0xff2200));
      sR.position.set(-bW/2-.04,bH/2+.2,oz); g.add(sR);
    });
  }

  g.position.set(x,0,z); g.rotation.y=rot;
  scene.add(g);
  return g;
}

// ══════════════════════════════════════════════════════════════
//  ROAD WAYPOINT SYSTEM
//  NPC cars follow road centre lines.
//  Waypoints = road intersections (multiples of STEP).
//  Each NPC picks a random direction at each intersection.
// ══════════════════════════════════════════════════════════════
// All 4 cardinal directions
const DIRS=[
  {dx:1,dz:0, angle:Math.PI/2},
  {dx:-1,dz:0,angle:-Math.PI/2},
  {dx:0,dz:1, angle:0},
  {dx:0,dz:-1,angle:Math.PI},
];

function pickDir(exclude){
  // Pick a random direction, optionally avoiding the reverse
  const opts=exclude?DIRS.filter(d=>!(d.dx===-exclude.dx&&d.dz===-exclude.dz)):DIRS;
  return opts[Math.floor(Math.random()*opts.length)];
}

// Snap NPC to nearest road centre after spawning
function snapToRoad(t){
  // Round position to nearest intersection, then offset into lane
  const ix=Math.round(t.x/STEP)*STEP;
  const iz=Math.round(t.z/STEP)*STEP;
  // Place in right lane relative to direction
  // For dir X: stay on z = iz ± ROAD/4, For dir Z: stay on x = ix ± ROAD/4
  if(Math.abs(t.dir.x)>Math.abs(t.dir.z)){
    t.x=ix; t.z=iz-ROAD/4*(t.dir.x>0?1:-1);
  } else {
    t.z=iz; t.x=ix+ROAD/4*(t.dir.z>0?-1:1);
  }
  t.nextIX=ix; t.nextIZ=iz;
}

// ══════════════════════════════════════════════════════════════
//  SPAWN PARKED CARS  (on road edges, right-side lane)
// ══════════════════════════════════════════════════════════════
function spawnParkedCars(){
  parkedCars.forEach(p=>scene.remove(p.mesh));
  parkedCars.length=0;
  for(let i=0;i<30;i++){
    // Pick a random road segment (between two intersections)
    const gi=(Math.floor(Math.random()*GRID)-GRID/2);
    const gj=(Math.floor(Math.random()*GRID)-GRID/2);
    const horizontal=Math.random()<.5;
    // Park on right kerb
    let cx,cz,rot;
    if(horizontal){
      cx=gi*STEP+STEP/2;
      cz=gj*STEP+ROAD/2-1.2;
      rot=Math.PI/2;
    } else {
      cx=gi*STEP+ROAD/2-1.2;
      cz=gj*STEP+STEP/2;
      rot=0;
    }
    const [col,neo]=CAR_COLORS[Math.floor(Math.random()*CAR_COLORS.length)];
    const type=CAR_TYPES[Math.floor(Math.random()*CAR_TYPES.length)];
    const mesh=makeCar(cx,cz,col,neo,rot,type,false);
    parkedCars.push({mesh,x:cx,z:cz,stolen:false,color:col,neon:neo,type});
  }
}
spawnParkedCars();

function spawnTraffic(){
  trafficList.forEach(t=>scene.remove(t.mesh));
  trafficList.length=0;
  for(let i=0;i<28;i++){
    const isPolice=i<3;
    // Start at random intersection
    const gx=(Math.floor(Math.random()*GRID)-GRID/2)*STEP;

    const spd=isPolice?.06:(.025+Math.random()*.03);
    const type=isPolice?CAR_TYPES[0]:CAR_TYPES[Math.floor(Math.random()*CAR_TYPES.length)];

             stuckTimer:0,

    mesh.position.set(t.x,0,t.z);
    mesh.rotation.y=dir.angle;
    trafficList.push(t);
  }
}

//  SYNTHWAVE MUSIC
// ══════════════════════════════════════════════════════════════
let audioCtx=null;
function initAudio(){
  if(audioCtx) return;
  audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended') audioCtx.resume();
  startSynthwave();
}
function startSynthwave(){
  const master=audioCtx.createGain(); master.gain.value=.28;
  const comp=audioCtx.createDynamicsCompressor();
  master.connect(comp); comp.connect(audioCtx.destination);
  const BPM=120,BAR=60/BPM*4;
  const CHORDS=[[220,277.2,330],[174.6,220,261.6],[261.6,329.6,392],[196,246.9,293.7]];
  const ARP=[220,261.6,330,392,440,392,330,261.6];
  function bass(f,w,d){const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='sawtooth';o.frequency.setValueAtTime(f/2,w);g.gain.setValueAtTime(0,w);g.gain.linearRampToValueAtTime(.5,w+.02);g.gain.exponentialRampToValueAtTime(.001,w+d*.8);o.connect(g);g.connect(master);o.start(w);o.stop(w+d);}
  function pad(fs,w,d){fs.forEach(f=>{const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='triangle';o.frequency.value=f;o.detune.value=(Math.random()-.5)*12;g.gain.setValueAtTime(0,w);g.gain.linearRampToValueAtTime(.07,w+.3);g.gain.linearRampToValueAtTime(0,w+d);o.connect(g);g.connect(master);o.start(w);o.stop(w+d+.1);});}
  function arp(w,bd){const s=bd/ARP.length;ARP.forEach((f,i)=>{const t=w+i*s,o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='square';o.frequency.value=f*2;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.05,t+.01);g.gain.exponentialRampToValueAtTime(.001,t+s*.8);o.connect(g);g.connect(master);o.start(t);o.stop(t+s);});}
  function kick(w){const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='sine';o.frequency.setValueAtTime(150,w);o.frequency.exponentialRampToValueAtTime(40,w+.12);g.gain.setValueAtTime(.8,w);g.gain.exponentialRampToValueAtTime(.001,w+.18);o.connect(g);g.connect(master);o.start(w);o.stop(w+.2);}
  function hat(w){const buf=audioCtx.createBuffer(1,audioCtx.sampleRate*.04,audioCtx.sampleRate);const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;const s=audioCtx.createBufferSource(),f=audioCtx.createBiquadFilter(),g=audioCtx.createGain();s.buffer=buf;f.type='highpass';f.frequency.value=9000;g.gain.setValueAtTime(.2,w);g.gain.exponentialRampToValueAtTime(.001,w+.04);s.connect(f);f.connect(g);g.connect(master);s.start(w);}
  let bar=0;
  function sched(){const now=audioCtx.currentTime+.1,ch=CHORDS[bar%4],bt=BAR/4;pad(ch,now,BAR);bass(ch[0],now,bt*1.5);bass(ch[0],now+bt*2,bt*1.5);if(bar%2===1)arp(now,BAR);[0,1,2,3].forEach(b=>{kick(now+b*bt);hat(now+b*bt+bt/2);});bar++;}
  sched(); setInterval(sched,BAR*1000-30);
}

// ══════════════════════════════════════════════════════════════
//  COLLISION RESOLUTION (AABB push-out)
// ══════════════════════════════════════════════════════════════
function resolveBox(px,pz,phw,phd,bx,bz,bhw,bhd){
  const dx=px-bx,dz=pz-bz;
  const ox=phw+bhw-Math.abs(dx), oz=phd+bhd-Math.abs(dz);
  if(ox<=0||oz<=0) return null;
  return ox<oz?{nx:Math.sign(dx)*ox,nz:0}:{nx:0,nz:Math.sign(dz)*oz};
}

// Move foot, pushing out of buildings
function moveFoot(dx,dz){
  footPos.x+=dx; footPos.z+=dz;
  for(const b of buildingBoxes){
    const r=resolveBox(footPos.x,footPos.z,.35,.35,b.x,b.z,b.hw,b.hd);
    if(r){footPos.x+=r.nx;footPos.z+=r.nz;}
  }
}

// Move player car, push out of buildings and parked/traffic cars. Return true=fatal crash
function moveCar(dx,dz){
  if(!playerCar) return false;
  playerCar.position.x+=dx; playerCar.position.z+=dz;
  const CHW=1.15,CHD=2.3; let fatal=false;
  for(const b of buildingBoxes){
    const r=resolveBox(playerCar.position.x,playerCar.position.z,CHW,CHD,b.x,b.z,b.hw,b.hd);
    if(r){ playerCar.position.x+=r.nx; playerCar.position.z+=r.nz;
      if(carSpeed>.20) fatal=true; carSpeed*=.2; lateralVel*=.1; }
  }
  for(const p of parkedCars){
    if(p.mesh===playerCar||p.stolen) continue;
    const r=resolveBox(playerCar.position.x,playerCar.position.z,CHW,CHD,p.x,p.z,1.15,2.35);
    if(r){ playerCar.position.x+=r.nx; playerCar.position.z+=r.nz;
      if(carSpeed>.25) fatal=true; carSpeed*=.25; }
  }
  return fatal;
}

// Move NPC car, push out of buildings (no fatal)
function moveNPC(t,dx,dz){
  t.x+=dx; t.z+=dz;
  for(const b of buildingBoxes){
    const r=resolveBox(t.x,t.z,1.15,2.35,b.x,b.z,b.hw,b.hd);
    if(r){ t.x+=r.nx; t.z+=r.nz; t.stuckTimer=(t.stuckTimer||0)+1; }
  }
}

// ══════════════════════════════════════════════════════════════
//  TRAFFIC AI  — road-following with waypoint turns
// ══════════════════════════════════════════════════════════════
let policeChasing=false;

function updateTraffic(dt){
  policeChasing=false;
  const blinkBlue=Math.sin(Date.now()*.025)>0;
  const blinkRed =!blinkBlue;

  for(const t of trafficList){
    const chasing=t.isPolice&&playerCar&&state==='driving';
    if(chasing) policeChasing=true;

    // Police chases player directly when close, otherwise uses road
    if(chasing&&playerCar){
      const pdx=playerCar.position.x-t.x, pdz=playerCar.position.z-t.z;
      const ang=Math.atan2(pdx,pdz);
      t.dir={dx:Math.sin(ang),dz:Math.cos(ang),angle:ang};
      t.mesh.rotation.y=ang;
      const spd=t.speed*3.5;
      moveNPC(t,t.dir.dx*spd,t.dir.dz*spd);

      // Police knockback: if police hits player car
      if(playerCar){
        const pr=resolveBox(playerCar.position.x,playerCar.position.z,1.15,2.3,t.x,t.z,1.15,2.3);
        if(pr&&carSpeed<.3){
          // Knockback: push player in direction police was heading
          knockVX=t.dir.dx*.35; knockVZ=t.dir.dz*.35;
          knockTimer=.5; // seconds of knockback
          t.stuckTimer=60; // police pauses after hit
        }
      }
    } else {
      // Normal road-following: move toward next intersection
      const targetX=Math.round(t.x/STEP)*STEP+(Math.abs(t.dir.dx)<.5?t.laneOff:0);
      const targetZ=Math.round(t.z/STEP)*STEP+(Math.abs(t.dir.dz)<.5?t.laneOff:0);

      if(t.stuckTimer>0){
        t.stuckTimer--; // paused after hit or building avoidance
      } else {
        const spd=t.speed;
        moveNPC(t,t.dir.dx*spd,t.dir.dz*spd);

        // Check if reached waypoint (intersection), then turn
        const distToNext=Math.hypot(t.x-Math.round(t.x/STEP)*STEP, t.z-Math.round(t.z/STEP)*STEP);
        if(distToNext<ROAD*.35){
          // At intersection — pick new direction (no u-turn)
          const newDir=pickDir(t.dir);
          t.dir=newDir;
          t.mesh.rotation.y=newDir.angle;
          // Update lane offset for new direction
          t.laneOff=ROAD/4*(Math.random()<.5?1:-1);
        }
      }
    }

    // Wrap city
    if(t.x> CITY_HALF) t.x=-CITY_HALF;
    if(t.x<-CITY_HALF) t.x= CITY_HALF;
    if(t.z> CITY_HALF) t.z=-CITY_HALF;
    if(t.z<-CITY_HALF) t.z= CITY_HALF;
    t.mesh.position.set(t.x,0,t.z);

    // Police light blink
    if(t.isPolice&&t.mesh.userData.lightBlue){
      t.mesh.userData.lightBlue.material.color.setHex(blinkBlue?0x0066ff:0x001133);
      t.mesh.userData.lightBlue.material.emissive?.setHex(blinkBlue?0x0044ff:0x000011);
      t.mesh.userData.lightRed.material.color.setHex(blinkRed?0xff2200:0x330800);
    }
  }

  policeAlertEl.style.opacity=(policeChasing&&state==='driving')?'1':'0';
}

  footSpeed=pointerDown?FOOT_RUN:FOOT_WALK;

  for(const p of parkedCars){

  camTarget.set(footPos.x-Math.sin(footAngle)*9,6.5,footPos.z-Math.cos(footAngle)*9);

// ══════════════════════════════════════════════════════════════
//  DRIVING UPDATE  — smooth brake, per-type physics, knockback
// ══════════════════════════════════════════════════════════════
// Smooth brake: target speed lerped down on hold
let brakeTarget=0;

function updateDriving(dt){
  if(!playerCar) return;
  const{maxSpd,accel,brake,steer,drift,nitroMult}=playerType;
  const effectiveMax=nitroActive?maxSpd*nitroMult:maxSpd;

  // Knockback from police hit
  if(knockTimer>0){
    knockTimer-=dt;
    playerCar.position.x+=knockVX;
    playerCar.position.z+=knockVZ;
    knockVX*=.88; knockVZ*=.88; // friction
  }

  // Smooth acceleration / brake
  if(pointerDown){
    // Smooth brake: interpolate carSpeed toward minimum (0.02)
    // Speed of braking = brake constant per frame, feels progressive
    brakeTarget=.02;
    carSpeed+=(brakeTarget-carSpeed)*Math.min(1,brake*2.2*dt*60);
  } else {
    // Accelerate
    carSpeed+=accel;
  }
  const nitroBoost=nitroActive?.018:0;
  carSpeed=Math.max(.02,Math.min(effectiveMax+nitroBoost,carSpeed));
  carSpeed-=.001; // natural decel

  // Steering
  const ratio=carSpeed/effectiveMax;
  carAngle-=dragDelta*steer*(.3+.7*ratio);

  const fwdX=Math.sin(carAngle),fwdZ=Math.cos(carAngle);
  lateralVel=lateralVel*drift+(-dragDelta*carSpeed*.3)*(1-drift);
  const moveX=fwdX*(carSpeed+nitroBoost)+Math.cos(carAngle)*lateralVel;
  const moveZ=fwdZ*(carSpeed+nitroBoost)-Math.sin(carAngle)*lateralVel;

  const fatal=moveCar(moveX,moveZ);
  if(fatal){ triggerGameOver(); return; }

  playerCar.rotation.y=carAngle;
  // Wheel spin
  playerCar.children.slice(2,6).forEach(w=>{ w.rotation.x+=carSpeed*10; });

  // Garage delivery
  if(playerCar.position.distanceTo(garagePos)<8){ deliverCar(); return; }

  // Camera
  camTarget.set(playerCar.position.x-fwdX*13,8,playerCar.position.z-fwdZ*13);
  camera.position.lerp(camTarget,.07);
  camera.lookAt(playerCar.position.x,1,playerCar.position.z);

  speedBarEl.style.width=(carSpeed/effectiveMax*100)+'%';
}

// ══════════════════════════════════════════════════════════════
//  DELIVER / GAME OVER
// ══════════════════════════════════════════════════════════════
function deliverCar(){
  score++; scoreValEl.textContent=score; doFlash('#00ff88');
  if(playerCar){playerCar.visible=false;playerCar=null;}
  state='foot'; footPos.set(garagePos.x+12,0,garagePos.z);
  footAngle=Math.PI; avatarGroup.visible=true;
  carBadgeEl.style.opacity='0';
  stateLabelEl.textContent='DELIVERED! // FIND ANOTHER';
  nitro=1; nitroCooldown=0; knockTimer=0;
  spawnParkedCars();
}

function triggerGameOver(){
  state='gameover'; finalScoreEl.textContent=score;
  document.getElementById('gameover-screen').style.display='flex';
  doFlash('#ff0000'); avatarGroup.visible=false;
}

// ══════════════════════════════════════════════════════════════
//  MINIMAP  — bottom-left, bigger player arrow with correct rotation
// ══════════════════════════════════════════════════════════════
const MM_SCALE=MM/(GRID*STEP);
function w2m(wx,wz){ return{mx:(wx+CITY_HALF)*MM_SCALE, my:(wz+CITY_HALF)*MM_SCALE}; }

function drawMinimap(){
  mmCtx.clearRect(0,0,MM,MM);
  mmCtx.fillStyle='rgba(2,2,18,0.95)'; mmCtx.fillRect(0,0,MM,MM);

  // Road grid (draw road strips)
  mmCtx.fillStyle='#0d1a30';
  for(let g=-GRID/2;g<=GRID/2;g++){
    const p=(g*STEP+CITY_HALF)*MM_SCALE;
    const rw=ROAD*MM_SCALE;
    mmCtx.fillRect(0,p-rw/2,MM,rw);
    mmCtx.fillRect(p-rw/2,0,rw,MM);
  }
  // Road centre lines (yellow)
  mmCtx.strokeStyle='#886600'; mmCtx.lineWidth=.6;
  for(let g=-GRID/2;g<=GRID/2;g++){
    const p=(g*STEP+CITY_HALF)*MM_SCALE;
    mmCtx.beginPath();mmCtx.moveTo(0,p);mmCtx.lineTo(MM,p);mmCtx.stroke();
    mmCtx.beginPath();mmCtx.moveTo(p,0);mmCtx.lineTo(p,MM);mmCtx.stroke();
  }

  // Parked cars
  mmCtx.fillStyle='#00ffff99';
  parkedCars.forEach(p=>{ if(p.stolen)return; const{mx,my}=w2m(p.x,p.z); mmCtx.fillRect(mx-1.5,my-1.5,3,3); });

  // Traffic
  mmCtx.fillStyle='#ff660077';
  trafficList.forEach(t=>{ if(t.isPolice)return; const{mx,my}=w2m(t.x,t.z); mmCtx.fillRect(mx-1.5,my-1.5,3,3); });

  // Police — pulsing blue
  const pulse=.5+.5*Math.sin(Date.now()*.014);
  mmCtx.fillStyle=`rgba(60,100,255,${.5+pulse*.5})`;
  trafficList.forEach(t=>{ if(!t.isPolice)return; const{mx,my}=w2m(t.x,t.z); mmCtx.beginPath();mmCtx.arc(mx,my,3.5,0,Math.PI*2);mmCtx.fill(); });

  // Garage pulsing
  const{mx:gx,my:gy}=w2m(garagePos.x,garagePos.z);
  mmCtx.fillStyle=`rgba(0,255,136,${.55+pulse*.45})`;
  mmCtx.fillRect(gx-5,gy-5,10,10);
  mmCtx.strokeStyle='#00ff88'; mmCtx.lineWidth=1.5; mmCtx.strokeRect(gx-5,gy-5,10,10);

  // Player — big rotated arrow
  const p3x=playerCar?playerCar.position.x:footPos.x;
  const p3z=playerCar?playerCar.position.z:footPos.z;
  // Rotation: Three.js Y rotation maps to minimap angle
  // carAngle=0 means facing +Z (down on minimap), so minimap angle = carAngle
  const pAng=state==='driving'?carAngle:footAngle;
  const{mx:px,my:py}=w2m(p3x,p3z);

  mmCtx.save();
  mmCtx.translate(px,py);
  mmCtx.rotate(pAng); // correct rotation matching world facing direction
  // Bigger, cleaner arrow
  const col=state==='driving'?'#ffff00':'#ffffff';
  mmCtx.fillStyle=col;
  mmCtx.strokeStyle='#00000088'; mmCtx.lineWidth=.8;
  mmCtx.beginPath();
  mmCtx.moveTo(0,-9);   // tip (forward)
  mmCtx.lineTo(-5,5);   // back-left
  mmCtx.lineTo(0,2);    // back indent
  mmCtx.lineTo(5,5);    // back-right
  mmCtx.closePath();
  mmCtx.fill(); mmCtx.stroke();
  // Centre dot
  mmCtx.fillStyle='#fff';
  mmCtx.beginPath(); mmCtx.arc(0,0,1.5,0,Math.PI*2); mmCtx.fill();
  mmCtx.restore();

  // Garage arrow at edge when off-screen
  const dxG=gx-px,dyG=gy-py,distG=Math.hypot(dxG,dyG);
  if(distG>22){
    const angG=Math.atan2(dyG,dxG);
    const M=12,cosA=Math.cos(angG),sinA=Math.sin(angG);
    let tMin=Infinity;
    if(cosA>.001) tMin=Math.min(tMin,(MM-M-px)/cosA);
    else if(cosA<-.001) tMin=Math.min(tMin,(M-px)/cosA);
    if(sinA>.001) tMin=Math.min(tMin,(MM-M-py)/sinA);
    else if(sinA<-.001) tMin=Math.min(tMin,(M-py)/sinA);
    tMin=Math.max(0,tMin);
    const ax=Math.max(M,Math.min(MM-M,px+cosA*tMin));
    const ay=Math.max(M,Math.min(MM-M,py+sinA*tMin));
    mmCtx.save(); mmCtx.translate(ax,ay); mmCtx.rotate(angG);
    mmCtx.fillStyle=`rgba(0,255,136,${.6+pulse*.4})`;
    mmCtx.beginPath();mmCtx.moveTo(8,0);mmCtx.lineTo(-5,-5);mmCtx.lineTo(-3,0);mmCtx.lineTo(-5,5);mmCtx.closePath();mmCtx.fill();
    mmCtx.restore();
  }

  // Border
  mmCtx.strokeStyle='#00ffff33'; mmCtx.lineWidth=1; mmCtx.strokeRect(0,0,MM,MM);
}

// ══════════════════════════════════════════════════════════════
//  TITLE ORBIT
// ══════════════════════════════════════════════════════════════
let titleT=0;
function titleOrbit(){
  titleT+=.0012;
  camera.position.set(Math.sin(titleT)*45,20+Math.sin(titleT*.35)*6,Math.cos(titleT)*45);
  camera.lookAt(0,0,0);
}

// ══════════════════════════════════════════════════════════════
//  MAIN LOOP
// ══════════════════════════════════════════════════════════════
const clock=new THREE.Clock();

function loop(){
  requestAnimationFrame(loop);
  const dt=Math.min(clock.getDelta(),.05); // cap dt

  updateDayNight(dt);

  if(state==='title'||state==='gameover'){
    titleOrbit(); renderer.render(scene,camera); return;
  }

  updateTraffic(dt);
  updateNitro(dt);

  if     (state==='foot')     updateFoot(dt);
  else if(state==='entering') updateEntering();
  else if(state==='driving')  updateDriving(dt);

  drawMinimap();
  renderer.render(scene,camera);
}

loop();
</script>
