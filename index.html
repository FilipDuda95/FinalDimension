<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Final dimension</title>

<link rel="shortcut icon" href="favicon.png">

<style>

/* ===== ZÁKLAD ===== */
html, body {
  margin: 0;
  padding: 0;
  background:black;
  background-image:url("style/1.jpg");
  background-size: cover;
  background-repeat: no-repeat;
  background-position: center;
  font-family: Arial, sans-serif;
  overflow-x: hidden;
}

/* ===== TOP BAR ===== */
#top-bar {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 8%;
  background-color: rgba(0, 0, 0, 0.9);
  color: white;
  z-index: 100;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.menu-icon {
  height: 100%;
  object-fit: contain;
}

/* ===== GALERIE ===== */
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 1rem;
  max-width: 1100px;
  margin: auto;
}

.square {
  position: relative;
  width: 100%;
  padding-bottom: 100%;
  background: white;
  border-radius: 10px;
  overflow: hidden;
  cursor: pointer;
}

.square img {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* ===== MODAL ===== */
.preview-modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.95);
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

.preview-modal img,
.preview-modal video,
.preview-modal iframe {
  max-width: 95vw;
  max-height: 90vh;
  border-radius: 12px;
}

.close {
  position: fixed;
  top: 20px;
  right: 30px;
  font-size: 45px;
  color: white;
  cursor: pointer;
}

</style>
</head>

<body>

<div id="top-bar">
  <div><img src="style/logo.png" class="menu-icon"></div>
</div>

<div style="margin-top:120vh;"></div>

<div class="gallery" id="gallery"></div>

<!-- ===== MODAL ===== -->
<div id="previewModal" class="preview-modal" onclick="closePreview(event)">
  <span class="close">×</span>
  <div id="previewContent"></div>
</div>

<script>

const API_KEY = 'TVŮJ_API_KLÍČ';
const ROOT_FOLDER_ID = 'TVÉ_FOLDER_ID';
const folderStack = [ROOT_FOLDER_ID];

async function loadFolder(folderId) {

  const query = encodeURIComponent(`'${folderId}' in parents and trashed = false`);
  const url = `https://www.googleapis.com/drive/v3/files?q=${query}&key=${API_KEY}&fields=files(id,name,mimeType,thumbnailLink)`;

  const response = await fetch(url);
  const data = await response.json();

  const gallery = document.getElementById('gallery');
  gallery.innerHTML = '';

  data.files.forEach(file => {

    const container = document.createElement('div');
    container.className = 'square';

    if (file.mimeType.startsWith('image/')) {

      const img = document.createElement('img');
      img.src = file.thumbnailLink;
      container.appendChild(img);

      container.onclick = () => openPreview(file);

    } else if (file.mimeType.startsWith('video/')) {

      const img = document.createElement('img');
      img.src = file.thumbnailLink || 'https://via.placeholder.com/300?text=Video';
      container.appendChild(img);

      container.onclick = () => openPreview(file);
    }

    gallery.appendChild(container);
  });
}

function openPreview(file) {

  const modal = document.getElementById('previewModal');
  const content = document.getElementById('previewContent');
  content.innerHTML = '';

  if (file.mimeType.startsWith('image/')) {

    const img = document.createElement('img');
    img.src = `https://drive.google.com/uc?export=view&id=${file.id}`;
    content.appendChild(img);

  } else if (file.mimeType.startsWith('video/')) {

    const iframe = document.createElement('iframe');
    iframe.src = `https://drive.google.com/file/d/${file.id}/preview`;
    iframe.allow = "autoplay";
    iframe.style.width = "80vw";
    iframe.style.height = "80vh";
    iframe.style.border = "none";

    content.appendChild(iframe);
  }

  modal.style.display = 'flex';
}

function closePreview(event) {
  if (event.target.id === 'previewModal' || event.target.className === 'close') {
    document.getElementById('previewModal').style.display = 'none';
    document.getElementById('previewContent').innerHTML = '';
  }
}

loadFolder(ROOT_FOLDER_ID);

</script>

</body>
</html>
