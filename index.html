<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Final dimension</title>

<style>

/* ===== ZÁKLAD ===== */

html, body {
  margin: 0;
  padding: 0;
  font-family: Arial, sans-serif;
  background: black;
  overflow-x: hidden;
}

/* ===== TOP BAR ===== */

#top-bar {
  position: fixed;
  top: 0;
  width: 100%;
  height: 60px;
  background: rgba(0,0,0,0.9);
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 100;
  padding: 0 20px;
}

#dropdown-menu {
  display: none;
  position: absolute;
  right: 20px;
  top: 60px;
  background: rgba(50,50,50,0.95);
  padding: 20px;
  border-radius: 8px;
  list-style: none;
}

#dropdown-menu li {
  padding: 5px 0;
}

#dropdown-menu a {
  color: white;
  text-decoration: none;
}

/* ===== GALERIE ===== */

#black-section {
  margin-top: 100vh;
  padding: 40px;
  background: black;
  color: white;
}

.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 20px;
}

.square {
  position: relative;
  padding-bottom: 100%;
  background: #222;
  border-radius: 12px;
  overflow: hidden;
  cursor: pointer;
}

.square img {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* ===== MODAL ===== */

.preview-modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.95);
  z-index: 9999;
  justify-content: center;
  align-items: center;
}

#previewContent {
  display: flex;
  justify-content: center;
  align-items: center;
}

.preview-modal img,
.preview-modal iframe {
  max-width: 95vw;
  max-height: 85vh;
  border-radius: 12px;
}

.close {
  position: fixed;
  top: 20px;
  right: 30px;
  font-size: 40px;
  color: white;
  cursor: pointer;
}

</style>
</head>

<body>

<div id="top-bar">
  <div>Final Dimension</div>
  <div id="dropdown-container">
    <button id="dropdown-button">Menu</button>
    <ul id="dropdown-menu">
      <li><a href="#">Hlavní</a></li>
      <li><a href="#black-section">Galerie</a></li>
    </ul>
  </div>
</div>

<!-- ===== HERO VIDEO ===== -->

<video autoplay muted loop style="position:fixed; width:100%; height:100%; object-fit:cover; z-index:-1;">
  <source src="pozadi/1.mp4" type="video/mp4">
</video>

<!-- ===== GALERIE SEKCE ===== -->

<div id="black-section">

<h2>Galerie</h2>

<div class="gallery" id="gallery"></div>

</div>

<!-- ===== MODAL ===== -->

<div id="previewModal" class="preview-modal" onclick="closePreview(event)">
  <span class="close">×</span>
  <div id="previewContent"></div>
</div>

<script>

const API_KEY = 'TVŮJ_API_KLÍČ';
const ROOT_FOLDER_ID = 'TVŮJ_FOLDER_ID';

async function loadFolder(folderId) {

  const query = encodeURIComponent(`'${folderId}' in parents and trashed = false`);
  const url = `https://www.googleapis.com/drive/v3/files?q=${query}&key=${API_KEY}&fields=files(id,name,mimeType,thumbnailLink)`;

  const response = await fetch(url);
  const data = await response.json();

  const gallery = document.getElementById('gallery');
  gallery.innerHTML = '';

  data.files.forEach(file => {

    const container = document.createElement('div');
    container.className = 'square';

    if (file.thumbnailLink) {
      const img = document.createElement('img');
      img.src = file.thumbnailLink;
      container.appendChild(img);
    }

    container.onclick = () => openPreview(file);

    gallery.appendChild(container);
  });
}

function openPreview(file) {

  const modal = document.getElementById('previewModal');
  const content = document.getElementById('previewContent');
  content.innerHTML = '';

  if (file.mimeType.startsWith('image/')) {

    const img = document.createElement('img');
    img.src = `https://drive.google.com/uc?export=view&id=${file.id}`;
    content.appendChild(img);

  } 
  else if (file.mimeType.startsWith('video/')) {

    const iframe = document.createElement('iframe');
    iframe.src = `https://drive.google.com/file/d/${file.id}/preview?autoplay=1`;
    iframe.allow = "autoplay; fullscreen";
    iframe.allowFullscreen = true;
    iframe.style.border = "none";

    content.appendChild(iframe);
  }

  modal.style.display = 'flex';
}

function closePreview(event) {
  if (event.target.id === 'previewModal' || event.target.className === 'close') {
    document.getElementById('previewModal').style.display = 'none';
    document.getElementById('previewContent').innerHTML = '';
  }
}

document.getElementById('dropdown-button').addEventListener('click', () => {
  const menu = document.getElementById('dropdown-menu');
  menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
});

loadFolder(ROOT_FOLDER_ID);

</script>

</body>
</html>
